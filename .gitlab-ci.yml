  FRONTEND_PATH: "code/academically-admin"
  BACKEND_PATH: "code/Academically/Academically.Web.Host"
  ENV_NAME: "ci"
  LOG_RETENTION: 7
  PRIVATE_SUBNET_A: "subnet-03f6e008bbf99fd12"
  PRIVATE_SUBNET_B: "subnet-06ff7fbbb445833a3"

<div class="modal-card card" role="dialog">
    <div class="card-header">
        <h4 class="card-header-title">{{ 'MessageInfo' | localize }}</h4>
    </div>
    <div class="card-body">
        <div class="read border-bottom d-flex align-items-center gap-20">
            <div class="icon d-flex">
                <span class="icon-read"></span>
            </div>
            <div class="d-flex flex-column">
                <span>Read</span>
                <span class="text-muted">&ndash;</span>
            </div>
        </div>
        <div class="delivered d-flex align-items-center gap-20">
            <div class="icon d-flex">
                <span class="icon-delivered"></span>
            </div>
            <div class="d-flex flex-column">
                <span>Delivered</span>
                <span class="text-muted">today at 08:21</span>
            </div>
        </div>
    </div>
</div>

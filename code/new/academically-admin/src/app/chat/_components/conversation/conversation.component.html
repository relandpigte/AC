<div class="conversation">
    <div class="conversation-header border-bottom">
        <div class="d-flex align-items-center">
            <div class="conversation-header-avatar">
                <a href="#" class="avatar">
                    <img [src]="getProfilePictureFromDocument(profileDocument, userId)" class="avatar-img rounded-circle" [alt]="recipientFullName" />
                </a>
            </div>

            <div class="conversation-header-recipient d-flex flex-column flex-grow-1">
                <h4 class="name">
                    <a href="#">{{ recipientFullName | titlecase }}</a>
                </h4>
                <p class="status">
                    <span class="text-success">●</span> Online
                </p>
            </div>

            <div *ngIf="hasActions" class="conversation-header-actions d-flex align-items-center ml-auto">
                <div class="dropdown">
                    <a href="#" class="dropdown-ellipses dropdown-toggle" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <span class="fe fe-more-horizontal"></span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right">
                        <div class="dropdown-item cursor-pointer">Mute Notifications</div>
                        <div class="dropdown-item cursor-pointer" (click)="handleArchiveChannel()">Archive Conversation</div>
                        <div class="dropdown-item cursor-pointer" (click)="handleDeleteChannel()">Delete Conversation</div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item cursor-pointer">Block User</div>
                    </div>
                </div>
            </div>

            <div *ngIf="hasClose" class="conversation-header-close d-flex align-items-center cursor-pointer ml-auto" (click)="handleCloseClick()">
                <img src="/assets/img/actions/close_2.svg" class="close">
            </div>
        </div>
    </div>

    <div *ngIf="showAttachmentInfo && attachedService" class="conversation-attachment border-bottom">
        <app-service-attachment [data]="attachedService"></app-service-attachment>
    </div>

    <div class="conversation-content scroll-wrapper" #scrollWrapper>
        <div class="d-flex flex-column gap-20" #scrollContent>
            <div class="conversation-day-title text-center">
                <span class="title mx-auto">Today</span>
            </div>

            <ng-container *ngIf="channelMessages.length > 0">
                <app-chat-conversation
                    [attr.id]="'msg-' + message.id"
                    *ngFor="let message of channelMessages"
                    [data]="message"
                    (onMessageInfoClick)="handleMessageInfoPopup(message)"
                    (onReplyClick)="handleMessageReply(message)"
                ></app-chat-conversation>
            </ng-container>

            <div class="conversation-info d-flex flex-column w-100">
                <div *ngIf="isShowLastMessageInfo" class="conversation-status text-right">
                    <span class="title">{{ lastMessageInfoStr }}</span>
                </div>
                <div *ngIf="isRecipientTyping" class="conversation-typing text-left">
                    <span class="title">{{ recipientName }} is typing</span>
                </div>
            </div>
        </div>
    </div>
</div>

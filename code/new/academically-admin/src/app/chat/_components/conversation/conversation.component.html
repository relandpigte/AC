<div class="conversation">
    <div class="conversation-header border-bottom">
        <div class="d-flex align-items-center">
            <div class="conversation-header-avatar">
                <a href="#" class="avatar">
                    <img src="assets/img/anonymous.png" alt="..." class="avatar-img rounded-circle">
                </a>
            </div>

            <div class="conversation-header-recipient d-flex flex-column flex-grow-1">
                <h4 class="name">
                    <a href="#">Dianna Smiley</a>
                </h4>
                <p class="status">
                    <span class="text-success">●</span> Online
                </p>
            </div>

            <div class="conversation-header-actions d-flex align-items-center ml-auto">
                <div class="dropdown">
                    <a href="#" class="dropdown-ellipses dropdown-toggle" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <span class="fe fe-more-horizontal"></span>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right">
                        <div class="dropdown-item cursor-pointer">Action 1</div>
                        <div class="dropdown-item cursor-pointer">Action 2</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="conversation-content d-flex flex-column gap-20">
        <div class="conversation-day-title text-center">
            <span class="title mx-auto">Today</span>
        </div>

        <ng-container *ngIf="data.length > 0">
            <app-chat-conversation *ngFor="let d of data" [data]="d"></app-chat-conversation>
        </ng-container>

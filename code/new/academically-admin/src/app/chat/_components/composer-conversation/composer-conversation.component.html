<div *ngIf="!isSearchingUser" class="chat-conversations-wrapper">
    <app-conversation
        [channel]="channel"
        [hasActions]="hasActions"
        [hasClose]="hasClose"
        [isUserBlocked]="isUserBlocked"
        [blockedByUser]="blockedByUser"
        [showAttachmentInfo]="showAttachmentInfo"
        [isRecipientTyping]="isRecipientTyping"
        [mutedUserChannelIds]="mutedUserChannelIds"
        (onCloseClick)="handleCloseClick()"
        (onBlockUser)="handleBlockUser()"
        (onUnblockUser)="handleUnBlockUser()"
        (onProcessNotification)="handleNotification($event)"
    ></app-conversation>
</div>
<div *ngIf="!isSearchingUser" class="chat-conversation-composer border-top mt-auto" [class.has-attachment]="!!replyingTo">
    <app-composer
        [channel]="channel"
        [replyingTo]="replyingTo"
        [blockedByUser]="blockedByUser"
        (onReply)="handleReplyClick($event)"
        [isUserBlocked]="isUserBlocked"
        (onUnblock)="handleUnBlockUser()"
    ></app-composer>
</div>

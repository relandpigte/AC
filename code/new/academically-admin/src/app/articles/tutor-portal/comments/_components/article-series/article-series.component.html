<div class="row">
  <div class="col-4">
    <div class="card">
      <ng-container *ngIf="!articles || !articles.length else articlesMenuTemplate">
        <div class="card-body comments">
          <div class="no-comments-container">
            <p class="text-muted p-0 m-0 text-center">
              {{ 'NoArticleFound' | localize }}
            </p>
          </div>
        </div>
      </ng-container>
      <ng-template #articlesMenuTemplate>
        <div class="list-group">
          <a *ngFor="let article of articles" href="#!article" [class.active]="selectedArticle.id === article.id"
            class="list-group-item list-group-item-action" (click)="$event.preventDefault(); onArticleClick(article)">
            <div class="row align-items-center">
              <div class="col-auto">
                <div class="avatar avatar-4by3">
                  <img [src]="getCourseImageUrl(model.thumbnailUrl)" alt="..." class="avatar-img rounded">
                </div>
              </div>
              <div class="col ms-n2">
                <h4 class="text-body text-focus mb-1 name">
                  {{ article.name }}
                </h4>
              </div>
            </div>
          </a>
        </div>
      </ng-template>
    </div>
  </div>
  <div class="col-8">
    <div class="card">
      <div class="card-header">
        <ul class="nav nav-tabs nav-tabs-sm card-header-tabs">
          <li class="nav-item">
            <a class="nav-link" id="questions-tab" data-toggle="tab" href="#questions-container" role="tab"
              aria-controls="questions-container" aria-selected="true">
              {{ 'Questions' | localize}}
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" id="comments-tab" data-toggle="tab" href="#comments-container" role="tab"
              aria-controls="comments-containerts" aria-selected="true">
              {{ 'Comments' | localize}}
            </a>
          </li>
        </ul>
      </div>
      <div class="card-body p-3">
        <div class="tab-content">
          <div class="tab-pane" id="questions-container" role="tabpanel" aria-labelledby="questions-tab">
            <h2 class="m-0 p-0">Coming Soon!</h2>
          </div>
          <div class="tab-pane fade show active" id="comments-container" role="tabpanel" aria-labelledby="events-tab">
            <app-comments [referenceId]="selectedArticle.id" [isSidebar]="false">
            </app-comments>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

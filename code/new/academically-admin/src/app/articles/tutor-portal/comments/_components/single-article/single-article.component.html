<div class="card">
  <div class="card-header">
    <ul class="mr-4 nav nav-tabs nav-tabs-sm card-header-tabs">
      <li class="nav-item">
        <a class="nav-link" id="questions-tab" data-toggle="tab" href="#questions-container" role="tab"
          aria-controls="questions-container" aria-selected="true">
          {{ 'Questions' | localize}}
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" id="comments-tab" data-toggle="tab" href="#comments-container" role="tab"
          aria-controls="comments-containerts" aria-selected="true">
          {{ 'Comments' | localize}}
        </a>
      </li>
    </ul>
  </div>

  <div class="tab-content p-3">
    <div class="tab-pane" id="questions-container" role="tabpanel" aria-labelledby="questions-tab">
      <h2 class="m-0 p-0">Coming Soon!</h2>
    </div>
    <div class="tab-pane fade show active" id="comments-container" role="tabpanel" aria-labelledby="events-tab">
      <app-comments [referenceId]="model.id" [isSidebar]="false">
      </app-comments>
    </div>
  </div>
</div>

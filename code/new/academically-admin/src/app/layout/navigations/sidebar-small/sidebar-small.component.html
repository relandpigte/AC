<nav class="navbar navbar-vertical navbar-vertical-sm fixed-left navbar-expand-md {{ navigationColor }}"
  id="sidebarSmall">
  <div class="container-fluid">
    <!-- Toggler -->
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#sidebarSmallCollapse"
      aria-controls="sidebarSmallCollapse" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Brand -->
    <a class="navbar-brand" href="/">
      <img src="/assets/img/{{ appLogo }}.png" class="navbar-brand-img mx-auto" alt="..." />
    </a>

    <!-- User (xs) -->
    <div class="navbar-user d-md-none">
      <!-- Dropdown -->
      <div class="dropdown">
        <!-- Toggle -->
        <a href="javascript:;" id="sidebarSmallIcon" class="dropdown-toggle" role="button" data-toggle="dropdown"
          aria-haspopup="true" aria-expanded="false">
          <div class="avatar avatar-sm avatar-online">
            <img [src]="getProfilePicture(user.profilePictureUrl)" class="avatar-img rounded-circle" alt="profile" />
          </div>
        </a>

        <!-- Menu -->
        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="sidebarSmallIcon">
          <user-navigation></user-navigation>
        </div>
      </div>
    </div>

    <!-- Collapse -->
    <div class="collapse navbar-collapse" id="sidebarSmallCollapse">
      <!-- Divider -->
      <hr class="navbar-divider d-none d-md-block mt-0 mb-3" />

      <sidebar-small-menu [routerEvent]="routerEvent"></sidebar-small-menu>

      <!-- Push content down -->
      <div class="mt-auto"></div>

      <!-- Customize -->
      <button class="btn btn-block btn-primary mb-3" (click)="onCustomizeClick()"><i class="fe fe-sliders"></i></button>

      <!-- User (md) -->
      <div class="navbar-user d-none d-md-flex flex-column" id="sidebarSmallUser">
        <!-- Messages -->
        <!-- <a [routerLink]="['/app/conversations']" class="navbar-user-link mb-3" data-toggle="modal"> -->
        <a [routerLink]="['/app/chat']" class="navbar-user-link mb-3" data-toggle="modal">
          <span class="icon">
            <i class="fe fe-message-square"></i>
          </span>
        </a>

        <!-- Notifications -->

        <app-notifications-preview [isModal]="true" buttonClass="mb-3"></app-notifications-preview>

        <!-- Dropup -->
        <div class="dropright">
          <!-- Toggle -->
          <a href="javascript:;" id="sidebarSmallIconCopy" class="dropdown-toggle" role="button" data-toggle="dropdown"
            aria-haspopup="true" aria-expanded="false">
            <div class="avatar avatar-sm avatar-online">
              <img [src]="getProfilePicture(user.profilePictureUrl)" class="avatar-img rounded-circle" alt="profile" />
            </div>
          </a>

          <!-- Menu -->
          <div class="dropdown-menu" aria-labelledby="sidebarSmallIconCopy">
            <user-navigation></user-navigation>
          </div>
        </div>
      </div>
    </div>
    <!-- / .navbar-collapse -->
  </div>
</nav>

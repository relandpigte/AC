<nav class="navbar navbar-vertical fixed-left navbar-expand-md {{ navigationColor }}" id="sidebar">
  <div class="container-fluid">
    <!-- Toggler -->
    <button
      class="navbar-toggler"
      type="button"
      data-toggle="collapse"
      data-target="#sidebarCollapse"
      aria-controls="sidebarCollapse"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Brand -->
    <a class="navbar-brand" href="/">
      <img src="/assets/img/{{ appLogo }}.png" class="navbar-brand-img mx-auto" alt="..." />
    </a>

    <!-- User (xs) -->
    <div class="navbar-user d-md-none">
      <!-- Dropdown -->
      <div class="dropdown">
        <!-- Toggle -->
        <a
          href="javascript:;"
          id="sidebarIcon"
          class="dropdown-toggle"
          role="button"
          data-toggle="dropdown"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <div class="avatar avatar-sm avatar-online">
            <img [src]="getProfilePicture(user.profilePictureUrl, user.id)" class="avatar-img rounded-circle" alt="profile" />
          </div>
        </a>

        <!-- Menu -->
        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="sidebarIcon">
          <user-navigation></user-navigation>
        </div>
      </div>
    </div>

    <!-- Collapse -->
    <div class="collapse navbar-collapse" id="sidebarCollapse">
      <!-- Form -->
      <form class="mt-4 mb-3 d-md-none">
        <div class="input-group input-group-rounded input-group-merge">
          <input type="search" class="form-control form-control-rounded form-control-prepended" placeholder="Search" aria-label="Search" />
          <div class="input-group-prepend">
            <div class="input-group-text">
              <span class="fe fe-search"></span>
            </div>
          </div>
        </div>
      </form>

      <sidebar-menu [routerEvent]="routerEvent"></sidebar-menu>

      <!-- Push content down -->
      <div class="mt-auto"></div>

      <!-- Customize -->
      <button class="btn btn-block btn-primary mb-4" (click)="onCustomizeClick()"><i class="fe fe-sliders mr-2"></i> Customize</button>

      <!-- User (md) -->
      <div class="navbar-user d-none d-md-flex" id="sidebarUser" *ngIf="themeSettings.navigationPosition !== NavigationPosition.Combo">
        <!-- Messages -->
        <a href="#" class="navbar-user-link" data-toggle="modal">
          <span class="icon">
            <i class="fe fe-message-square"></i>
          </span>
        </a>

        <!-- Dropup -->
        <div class="dropup">
          <!-- Toggle -->
          <a
            href="javascript:;"
            id="sidebarIconCopy"
            class="dropdown-toggle"
            role="button"
            data-toggle="dropdown"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <div class="avatar avatar-sm avatar-online">
              <img [src]="getProfilePicture(user.profilePictureUrl, user.id)" class="avatar-img rounded-circle" alt="profile" />
            </div>
          </a>

          <!-- Menu -->
          <div class="dropdown-menu" aria-labelledby="sidebarIconCopy">
            <user-navigation></user-navigation>
          </div>
        </div>

        <!-- Notifications -->
        <a href="#sidebarModalSearch" class="navbar-user-link" data-toggle="modal">
          <span class="icon active">
            <i class="fe fe-bell"></i>
          </span>
        </a>
      </div>
    </div>
    <!-- / .navbar-collapse -->
  </div>
</nav>

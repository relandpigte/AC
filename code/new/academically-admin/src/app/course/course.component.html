<div [@routerTransition]>
    <div class="container-fluid course-content d-flex flex-row flex-nowrap mb-5">
        <div class="course-content-left flex-grow-1">
            <div class="row">
                <div class="col col-sm-12">
                    <router-outlet></router-outlet>
                </div>
            </div>
        </div>
        <div class="course-content-right">
            <div class="row">
                <div class="col col-sm-12">
                    <ng-container *ngIf="isAboutTab || isDiscussionTab">
                        <app-review-badge [data]="data" [review]="review"></app-review-badge>
                        <app-start-badge [data]="data" (onReview)="onReview($event)"></app-start-badge>
                        <app-instructor-badge [data]="data"></app-instructor-badge>
                        <app-related-courses [data]="data"></app-related-courses>
                    </ng-container>
                    <ng-container *ngIf="isReviewsTab">
                        <app-service-review-stats></app-service-review-stats>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>
</div>

<form autocomplete="off" #verifyMobileNumberForm="ngForm">
  <div class="card" [loader]="isLoading">
    <div class="card-header">
      <h4 class="card-header-title">
        {{ 'ContactNumber' | localize}}
      </h4>
    </div>
    <div class="card-body d-flex flex-column align-items-center justify-content-center">

      <div class="form-group col-6" [class.required]="currentState === PhoneVerificationState.NotSent">
        <label class="col-form-label" for="PhoneNumber">{{ 'PhoneNumber' | localize }}</label>
        <ng-container
          *ngIf="currentState === PhoneVerificationState.NotSent || currentState === PhoneVerificationState.EditSent; else verificationCodeSentPhoneTemplate">
          <ngx-intl-tel-input [(ngModel)]="phoneNumber" [disabled]="isVerificationCodeSent"
            [enableAutoCountrySelect]="false" [searchCountryFlag]="true" [phoneValidation]="true"
            [enablePlaceholder]="true" [selectFirstCountry]="false"
            [searchCountryField]="[SearchCountryField.Iso2, SearchCountryField.Name]"
            [selectedCountryISO]="CountryISO.UnitedKingdom" [maxLength]="15" [separateDialCode]="true"
            [numberFormat]="PhoneNumberFormat.International" id="PhoneNumber" name="PhoneNumber">
          </ngx-intl-tel-input>
        </ng-container>
        <ng-template #verificationCodeSentPhoneTemplate>
          <div class="input-group input-group-merge">
            <input class="form-control form-control-appended" type="text" [value]="phoneNumber" readonly disabled />
            <div class="input-group-append">
              <button (click)="onEditPhoneNumberClick()" class="btn btn-sm btn-light">
                <i class="fe fe-edit mr-1"></i>Edit
              </button>
            </div>
          </div>
        </ng-template>
      </div>

      <div class="form-group col-6 required" *ngIf="currentState === PhoneVerificationState.Sent">
        <label class="col-form-label" for="VerificationCode">{{ 'VerificationCode' | localize }}</label>
        <input class="form-control" type="text" [(ngModel)]="verificationCode" id="VerificationCode"
          name="VerificationCode" #verificationCodeModel="ngModel" #verificationCodeEl required />
        <abp-validation-summary [control]="verificationCodeModel" [controlEl]="verificationCodeEl">
        </abp-validation-summary>
      </div>

    </div>
  </div>
  <div class="d-flex justify-content-between">
    <button [routerLink]="['/app/tutor-wizard/address']" type="button" class="btn btn-white">
      {{ 'Back' | localize }}
    </button>
    <ng-container
      *ngIf="currentState === PhoneVerificationState.NotSent || currentState === PhoneVerificationState.EditSent; else verificationCodeSentTemplate">
      <button *ngIf="!isLoading || isSending" (click)="onSendClick()" type="submit" class="btn btn-primary"
        [disabled]="!verifyMobileNumberForm.form.valid || !phoneNumber || isSending || resendTimer">
        <span *ngIf="isSending" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <span class="badge badge-soft-danger" *ngIf="resendTimer">
          {{ resendTimer }}
        </span>
        {{ (!isSending ? 'Send' : 'Sending') | localize }}
      </button>
    </ng-container>
    <ng-template #verificationCodeSentTemplate>
      <div>
        <button (click)="onResendClick()" type="submit" class="btn btn-primary mr-3"
          *ngIf="currentState !== PhoneVerificationState.Verified"
          [disabled]="currentState === PhoneVerificationState.Sending || isLoading || resendTimer">
          <span *ngIf="currentState === PhoneVerificationState.Sending" class="spinner-border spinner-border-sm"
            role="status" aria-hidden="true"></span>
          <span class="badge badge-soft-danger" *ngIf="resendTimer">
            {{ resendTimer }}
          </span>
          {{ (!isLoading ? 'Resend' : 'Resending') | localize }}
        </button>
        <button (click)="onVerifyClick()" type="submit" class="btn btn-primary"
          [disabled]="!verificationCode && currentState !== PhoneVerificationState.Verified || isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          {{ (!isLoading ? 'Next' : 'Verifying') | localize }}
        </button>
      </div>
    </ng-template>
  </div>
</form>

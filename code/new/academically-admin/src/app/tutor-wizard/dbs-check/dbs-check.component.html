<form class="form-horizontal" autocomplete="off" #createEditForm="ngForm" (ngSubmit)="onFormSubmit()">
  <div class="card">
    <div class="card-header">
      <div class="row align-items-center">
        <div class="col">
          <h4 class="card-header-title">{{ 'DbsCheck' | localize}}</h4>
        </div>
      </div>
    </div>
    <div class="card-body" [loader]="isLoading">
      <div class="form-group">
        <div class="custom-control custom-checkbox">
          <input [(ngModel)]="isDbsRequired" class="custom-control-input" id="isDbsRequired" name="isDbsRequired"
            type="checkbox" (change)="onDbsRequiredChange()" />
          <label class="custom-control-label" for="isDbsRequired">{{ 'DbsCheckMessage' | localize }}</label>
        </div>
      </div>

      <ng-container *ngIf="isDbsRequired">

        <div class="form-row">

          <div class="form-group col-md-6 required">
            <label class="col-form-label" for="dbsNumber">{{ 'DbsNumber' | localize}}</label>
            <input [(ngModel)]="model.dbsNumber" #dbsNumberModel="ngModel" #dbsNumberEl class="form-control" type="text"
              id="dbsNumber" name="dbsNumber" required />
            <abp-validation-summary [control]="dbsNumberModel" [controlEl]="dbsNumberEl">
            </abp-validation-summary>
          </div>

          <div class="form-group col-md-6 required">
            <label class="col-form-label" for="dateOfIssue">{{ 'DateOfIssue' | localize}}</label>
            <div class="input-group input-group-merge" (click)="dp.show()">
              <input [(ngModel)]="dateOfIssue" #dateOfIssueModel="ngModel" #dateOfIssueEl
                class="form-control form-control-appended" type="text" id="dateOfIssue" name="dateOfIssue" required
                #dp="bsDatepicker" bsDatepicker [bsConfig]="datePickerConfig" />
              <div class="input-group-append">
                <div class="input-group-text">
                  <span class="fas fa-calendar"></span>
                </div>
              </div>
            </div>
            <abp-validation-summary [control]="dateOfIssueModel" [controlEl]="dateOfIssueEl">
            </abp-validation-summary>
          </div>

        </div>

        <div class="form-group">
          <div class="custom-control custom-checkbox">
            <input [(ngModel)]="isDbsCheckAgreed" class="custom-control-input" id="isDbsCheckAgreed"
              name="isDbsCheckAgreed" type="checkbox" required />
            <label class="custom-control-label" for="isDbsCheckAgreed">{{ 'DbsCheckAgreementMessage' | localize
              }}</label>
          </div>
        </div>


        <app-document-uploader [maxFiles]="1" [cropImages]="true" [allowedExtensions]="dbsCertificatesFileExtensions">
        </app-document-uploader>

      </ng-container>

    </div>
  </div>
  <div class="d-flex justify-content-between">
    <button (click)="onBackClick()" type="button" class="btn btn-white">
      {{ 'Back' | localize }}
    </button>

    <div class="btn-group-toggle text-center d-flex">
      <div *ngIf="permission.isGranted('Pages.TutorApplications.Approve')">
        <input type="radio" class="btn-check" [disabled]="isApproving || isDeclining || isLoading"
          name="approval" id="declined" autocomplete="off" value="declined" (click)="onStatusChange($event)">
        <label class="btn btn-white mr-lg-2" for="declined">
          <span *ngIf="isDeclining" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          <i *ngIf="!isDeclining" class="fe fe-x-circle"></i>
          {{ 'Declined' | localize }}
        </label>
      </div>
      <div *ngIf="permission.isGranted('Pages.TutorApplications.Reject')">
        <input type="radio" class="btn-check" [disabled]="isApproving || isDeclining || isLoading"
          name="approval" id="approved" value="approved" autocomplete="off" (click)="onStatusChange($event)">
        <label class="btn btn-white" for="approved">
          <span *ngIf="isApproving" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          <i *ngIf="!isApproving" class="fe fe-check-circle"></i>
          {{ 'Approved' | localize }}
        </label>
      </div>
    </div>

    <button  type="submit" *ngIf="!isDbsRequired && !isReadOnly"
      type="submit" class="btn btn-primary ml-auto mr-2">
      {{ 'Skip' | localize }}
    </button>
    <button [disabled]="(!createEditForm.form.valid && isDbsRequired && !dbsCertificateFile && !defaultFile)|| !isDbsRequired || isLoading"
      type="submit" class="btn btn-primary" *ngIf="!isReadOnly" type="submit">
      {{ 'Next' | localize }}
    </button>
    <button *ngIf="isReadOnly" type="button" class="btn btn-primary" (click)="onNavigateNextScreen()">
      {{ 'Next' | localize }}
    </button>
  </div>
</form>

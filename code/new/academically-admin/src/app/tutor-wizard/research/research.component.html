<app-profile-research [userId]="userId" #userResearch ></app-profile-research>
<div class="d-flex justify-content-between">
  <button (click)="onBackClick()" type="button" class="btn btn-white">
    {{ 'Back' | localize }}
  </button>
  <button *ngIf="!isReadOnly" (click)="onNextClick()" [disabled]="isLoading || isNextEnabled" type="submit" class="btn btn-primary ml-auto mr-2">
    {{ 'Skip' | localize }}
  </button>
  <button *ngIf="!isReadOnly" (click)="onNextClick()" [disabled]="isLoading || !isNextEnabled" type="submit" class="btn btn-primary">
    {{ 'Next' | localize }}
  </button>
  <button *ngIf="isReadOnly" type="button" class="btn btn-primary" (click)="onNavigateNextScreen()">
    {{ 'Next' | localize }}
  </button>
</div>

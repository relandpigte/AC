<app-profile-research #userResearch></app-profile-research>
<div class="d-flex justify-content-between">
  <button [routerLink]="['/app/tutor-wizard/education']" type="button" class="btn btn-white">
    {{ 'Back' | localize }}
  </button>
  <button (click)="onNextClick()" [disabled]="isLoading || isNextEnabled" type="submit" class="btn btn-primary ml-auto mr-2">
    {{ 'Skip' | localize }}
  </button>
  <button (click)="onNextClick()" [disabled]="isLoading || !isNextEnabled" type="submit" class="btn btn-primary">
    {{ 'Next' | localize }}
  </button>
</div>

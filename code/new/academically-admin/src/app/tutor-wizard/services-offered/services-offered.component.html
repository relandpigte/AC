<div class="card bg-transparent">

  <div class="card-header">
    <h4 class="card-header-title">{{ 'ServicesOffered' | localize}}</h4>
  </div>

  <div class="card-body">
    <app-services [userId]="userId"></app-services>
  </div>

</div>
<div class="d-flex justify-content-between">
  <button (click)="onBackClick()" type="button" class="btn btn-white">
    {{ 'Back' | localize }}
  </button>
  <button *ngIf="!isReadOnly" (click)="onNextClick()" type="submit"
    [disabled]='services && (services.isLoading || !services.categories.length)' class="btn btn-primary">
    {{ 'Next' | localize }}
  </button>
  <button *ngIf="isReadOnly" type="button" class="btn btn-primary" (click)="onNavigateNextScreen()">
    {{ 'Next' | localize }}
  </button>
</div>

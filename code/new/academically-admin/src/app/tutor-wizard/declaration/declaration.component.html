<div class="card">

  <div class="card-header">
    <h4 class="card-header-title">{{ 'Declaration' | localize}}</h4>
  </div>

  <div class="card-body" [loader]="isLoading">

    <p class="text-body mb-4">
      {{ 'DeclarationInstruction' | localize }}
    </p>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration1' }">
    </ng-container>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration2' }">
    </ng-container>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration3' }">
    </ng-container>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration4' }">
    </ng-container>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration5' }">
    </ng-container>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration6' }">
    </ng-container>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration7' }">
    </ng-container>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration8' }">
    </ng-container>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration9' }">
    </ng-container>

    <ng-container *ngTemplateOutlet="declarationTemplate; context: { id: 'declaration10' }">
    </ng-container>

  </div>
</div>
<div class="d-flex justify-content-between">
  <button [disabled]="(isReadOnly && !(tutorVerificationPrevStep?.status === tutorVerificationStepStatus.Saved))" (click)="onBackClick()" type="button" class="btn btn-white">
    {{ 'Back' | localize }}
  </button>

  <div *ngIf="tutorVerificationStep?.status === tutorVerificationStepStatus.Saved" class="btn-group-toggle text-center d-flex">
    <div *ngIf="permission.isGranted('Pages.TutorApplications.Approve')">
      <input type="radio" class="btn-check" [disabled]="isApproving || isDeclining || isLoading"
        name="approval" id="declined" autocomplete="off" value="declined" (click)="onStatusChange($event)">
      <label class="btn btn-white mr-lg-2" for="declined">
        <span *ngIf="isDeclining" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <i *ngIf="!isDeclining" class="fe fe-x-circle"></i>
         {{ 'Declined' | localize }}
      </label>
    </div>
    <div *ngIf="permission.isGranted('Pages.TutorApplications.Reject')">
      <input type="radio" class="btn-check" [disabled]="isApproving || isDeclining || isLoading"
        name="approval" id="approved" value="approved" autocomplete="off" (click)="onStatusChange($event)">
      <label class="btn btn-white" for="approved">
        <span *ngIf="isApproving" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <i *ngIf="!isApproving" class="fe fe-check-circle"></i>
        {{ 'Approved' | localize }}
      </label>
    </div>
  </div>

  <button *ngIf="!isReadOnly" (click)="onNextClick()" [disabled]="isLoading || !allDeclarationsChecked()" type="submit"
    class="btn btn-success">
    {{ 'CompleteApplication' | localize }}
  </button>

</div>

<ng-template #declarationTemplate let-id="id">
  <div class="form-group">
    <div class="custom-control custom-checkbox">
      <input [(ngModel)]="model[id]" class="custom-control-input" [id]="id" [name]="id" type="checkbox" />
      <label class="custom-control-label" [for]="id">{{ id | titlecase | localize }}</label>
    </div>
  </div>
</ng-template>

<div class="card">

  <div class="card-header">
    <h4 class="card-header-title">{{ 'ProfilePicture' | localize}}</h4>
  </div>

  <div class="card-body d-flex justify-content-center">
    <div class="avatar avatar-xxl header-avatar-top">
      <img alt="..." class="avatar-img rounded-circle border border-4 border-body no-picture-border"
        [src]="getProfilePicture(user.profilePictureUrl)" />
      <app-profile-picture-changer *ngIf="!isReadOnly" [user]="user" (profilePictureUpdated)="onProfilePictureUpdated($event)">
      </app-profile-picture-changer>
    </div>
  </div>
</div>
<div class="d-flex justify-content-between">
  <button (click)="onBackClick()" type="button" class="btn btn-white">
    {{ 'Back' | localize }}
  </button>
  <button *ngIf="!isReadOnly" (click)="onNextClick()" [disabled]="!user.profilePictureUrl" type="submit" class="btn btn-primary">
    {{ 'Next' | localize }}
  </button>
  <button *ngIf="isReadOnly" type="button" class="btn btn-primary" (click)="onNavigateNextScreen()">
    {{ 'Next' | localize }}
  </button>
</div>

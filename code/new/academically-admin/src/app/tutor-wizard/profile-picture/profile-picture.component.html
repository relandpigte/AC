<div class="card">
  <div class="card-body d-flex justify-content-center">
    <div class="avatar avatar-xxl header-avatar-top">
      <img alt="..." class="avatar-img rounded-circle border border-4 border-body no-picture-border"
        [src]="getProfilePicture(user.profilePictureUrl)" />
      <app-profile-picture-changer [user]="user" (profilePictureUpdated)="onProfilePictureUpdated($event)">
      </app-profile-picture-changer>
    </div>
  </div>
</div>
<div class="d-flex justify-content-between">
  <button [routerLink]="['/app/tutor-wizard/services-offered']" type="button" class="btn btn-white">
    {{ 'Back' | localize }}
  </button>
  <button (click)="onNextClick()" type="submit" class="btn btn-primary">
    {{ 'Next' | localize }}
  </button>
</div>

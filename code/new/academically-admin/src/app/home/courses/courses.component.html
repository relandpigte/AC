<div class="row">
  <div class="col"></div>
  <div class="col-auto ng-star-inserted">
    <a class="btn btn-primary" (click)="onCreateClick()">
      {{ 'CreateCourse' | localize}}
    </a>
  </div>
</div>
<br />
<div class="tab-content" [loader]="isLoading">
  <div class="tab-pane fade active show" id="tabPaneOne" role="tabpanel">
    <div class="row listAlias">
      <div *ngFor="let course of courses" class="col-12 col-md-6 col-xl-4">
        <div class="card cursor-pointer" [routerLink]="['/app/courses', course.id]">
          <img *ngIf="!course.courseImageUrl" src="/assets/themes/dashkit/img/avatars/projects/project-1.jpg" alt="..."
            class="card-img-top">
          <img *ngIf="course.courseImageUrl" [src]="course.courseImageUrl" alt="..." class="card-img-top">
          <div class="card-body">
            <div class="row align-items-center">
              <div class="col">
                <h4 class="mb-2 name">
                  <a href="project-overview.html">{{ course.name }}</a>
                </h4>
                <p class="card-text small text-muted">
                  {{ course.subtitle }}
                </p>
              </div>
            </div>
          </div>
          <div class="card-footer card-footer-boxed">
            <div class="d-flex justify-content-between align-items-center w-100">
              <time class="small"> {{ course.creationTime | date: 'MMM dd, yyyy' }} </time>
              <div class="avatar-group">
                <a href="#" (click)="$event.preventDefault();" class="avatar avatar-xs"
                  [tooltip]="course.creatorUser.fullName">
                  <img
                    [src]="getProfilePictureFromDocument(course.creatorUser.profilePictureDocument, course.creatorUser.id)"
                    class="avatar-img rounded-circle" alt="...">
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <div class="col"></div>
  <div class="col-auto ng-star-inserted">
  <a class="btn btn-primary" (click)="onCreateClick()">
    {{ 'CreateCourse' | localize}}
  </a>
</div>
</div>
<br/>
<div class="tab-content">
  <div class="tab-pane fade active show" id="tabPaneOne" role="tabpanel">
    <div class="row listAlias">
      <div *ngFor='let course of courses' class="col-12 col-md-6 col-xl-4">

        <!-- Card -->
        <div class="card">

          <!-- Image -->
          <a href="#">
            <img src="https://dashkit.goodthemes.co/assets/img/avatars/projects/project-1.jpg" alt="..."
              class="card-img-top">
          </a>

          <!-- Body -->
          <div class="card-body">
            <div class="row align-items-center">
              <div class="col">

                <!-- Title -->
                <h4 class="mb-2 name">
                  <a href="#">{{course.courseName}}</a>
                </h4>

                <!-- Subtitle -->
                <p class="card-text small text-muted">
                  Created at {{course.createdAt}}
                </p>

              </div>
              <div class="col-auto">

                <!-- Dropdown -->
                <div class="dropdown">
                  <a href="#" class="dropdown-ellipses dropdown-toggle" role="button" data-toggle="dropdown"
                    aria-haspopup="true" aria-expanded="false">
                    <i class="fe fe-more-vertical"></i>
                  </a>
                  <div class="dropdown-menu dropdown-menu-right">
                    <a href="#!" class="dropdown-item">
                      Action
                    </a>
                    <a href="#!" class="dropdown-item">
                      Another action
                    </a>
                    <a href="#!" class="dropdown-item">
                      Something else here
                    </a>
                  </div>
                </div>

              </div>
            </div> <!-- / .row -->
          </div>

          <!-- Footer -->
          <div class="card-footer card-footer-boxed">
            <div class="row align-items-center">
              <div class="col">
                <div class="row align-items-center no-gutters">
                  <div class="col-auto">
                    <!-- Value -->
                    <p class="mb-3">
                      
                      <span *ngIf='course.status===true' class="badge bg-success-soft">
                        Active
                      </span>
                      <span *ngIf='course.status===false' class="badge bg-danger-soft">
                        In Active
                      </span>
                    </p>
                  </div>
                  
                </div> <!-- / .row -->
              </div>
              <div class="col-auto">

                <!-- Avatar group -->
                <div *ngFor='let in of [0,1,2]' class="avatar-group">
                  <a href="#" class="avatar avatar-xs" data-toggle="tooltip" title="Ab Hadley">
                    <img src="https://dashkit.goodthemes.co/assets/img/avatars/profiles/avatar-2.jpg" alt="..."
                      class="avatar-img rounded-circle">
                  </a>
                </div>

              </div>
            </div> <!-- / .row -->
          </div>
        </div>

      </div>
    </div> <!-- / .row -->
  </div>
  
</div>

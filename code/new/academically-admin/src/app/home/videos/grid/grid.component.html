<div class="row listAlias">
    <div *ngFor="let video of videos" class="col-12 col-md-6 col-xl-4">
      <div class="card">
        <a href="#!visit" (click)="$event.preventDefault(); onVisitVideoClick(video)">
          <img [src]="getServiceImageUrl(video.thumbnailDocument)" alt="..." class="card-img-top">
        </a>
        <div class="card-body">
          <div class="row align-items-center">
            <div class="col">
              <h4 class="mb-2 name">
                <a href="#!visit" (click)="$event.preventDefault(); onVisitVideoClick(video)">
                  {{ video.name }}
                </a>
              </h4>
              <p class="card-text small text-muted">
                {{ 'Created' | localize }} {{ convertMomentToDateAgo(video.creationTime) }}
              </p>
            </div>
            <div class="col-auto">
              <div class="dropdown">
                <a href="#" class="dropdown-ellipses dropdown-toggle" role="button" data-toggle="dropdown"
                  aria-haspopup="true" aria-expanded="false">
                  <i class="fe fe-more-vertical"></i>
                </a>
                <div class="dropdown-menu dropdown-menu-right">
                  <a href="#!visit" class="dropdown-item" (click)="$event.preventDefault(); onVisitVideoClick(video)">
                    {{ 'Visit' | localize }}
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

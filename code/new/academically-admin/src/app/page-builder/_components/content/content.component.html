<div class="row">
  <div class="col-8">
    <div class="card">
      <div class="card-body">
        <div class="no-content">
          <img src="/assets/themes/dashkit/img/illustrations/scale.svg" alt="..." class="img-fluid">
          <h3 class="title">
            {{ 'CreateYourLesson' | localize }}
          </h3>
          <p class="text-muted">
            {{ 'CreateYourLessonSubheader' | localize }}
          </p>
          <a href="javascript:;" class="add-content">
            <i class="fe fe-plus"></i>
            {{ 'AddContent' | localize | titlecase }}
          </a>
        </div>
      </div>
    </div>
    <div class="actions">
      <a href="javascript:;" class="add-section">
        <i class="fe fe-plus"></i>
        {{ 'AddSection' | localize | titlecase }}
      </a>
    </div>
  </div>
  <div class="col-4">
    <div class="card">
      <div class="card-body">
        <div class="no-selected-content">
          <p class="p-0 m-0 text-center">{{ 'NoContentYet' | localize }}</p>
        </div>
      </div>
    </div>
  </div>
</div>

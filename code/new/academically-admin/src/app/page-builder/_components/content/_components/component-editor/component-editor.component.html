<div class="card card-sm">
  <div class="card-header">
    <div class="row">
      <div class="col d-flex align-items-center">
        <h4 class="card-header-title">
          {{ component.name }}
        </h4>
      </div>
      <div class="col-auto">
        <button (click)="onMoveUpClick()" class="btn btn-sm btn-outline-info">
          <i class="fe fe-corner-left-up"></i>
        </button>
      </div>
    </div>
  </div>
  <div class="card-body">
    <app-color-picker [(color)]="component.backgroundColor"></app-color-picker>
    <ng-container [ngSwitch]="component.type">
      <app-body-text-component-editor *ngSwitchCase="'body-text'" [component]="component">
      </app-body-text-component-editor>
      <app-image-component-editor *ngSwitchCase="'image'" [component]="component">
      </app-image-component-editor>
      <app-image-component-editor *ngSwitchDefault [component]="component" [cropperAspectRationWidth]="1440"
        [cropperAspectRationHeight]="380">
      </app-image-component-editor>
    </ng-container>

    <div class="card card-sm mb-0" *ngIf="!component.disableMargins">
      <div class="card-header">
        <h4 class="card-header-title">
          {{ 'Margin' | localize }}
        </h4>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-5">
            <div *ngFor="let marginType of MarginType | enumToArray | keyvalue" class="form-check">
              <input [(ngModel)]="component.marginType" (change)="onMarginTypeChange()" class="form-check-input"
                type="radio" name="marginType" id="margin_{{marginType.key}}"
                [value]="MarginType[MarginType[marginType.key]]">
              <label class="form-check-label" for="margin_{{marginType.key}}">
                {{ marginType.value }}
              </label>
            </div>
          </div>
          <div class="col-7">
            <div class="form-group row">
              <label class="col-form-label-sm col-form-label col-5" for="top">{{ 'Top' | localize}}</label>
              <div class="col-7">
                <div class="input-group input-group-sm">
                  <input [readonly]="component.marginType !== MarginType.Custom" [(ngModel)]="component.marginTop"
                    #topModel="ngModel" #topEl class="form-control form-control-sm" type="number" id="top" name="top"
                    [min]="0" />
                  <div class="input-group-append">
                    <span class="input-group-text">px</span>
                  </div>
                </div>
              </div>
              <abp-validation-summary [control]="topModel" [controlEl]="topEl">
              </abp-validation-summary>
            </div>
            <div class="form-group row">
              <label class="col-form-label-sm col-form-label col-5" for="bottom">{{ 'Bottom' | localize}}</label>
              <div class="col-7">
                <div class="input-group input-group-sm">
                  <input [readonly]="component.marginType !== MarginType.Custom" [(ngModel)]="component.marginBottom"
                    #bottomModel="ngModel" #bottomEl class="form-control form-control-sm" type="number" id="bottom"
                    name="bottom" [min]="0" />
                  <div class="input-group-append">
                    <span class="input-group-text">px</span>
                  </div>
                </div>
              </div>
              <abp-validation-summary [control]="bottomModel" [controlEl]="bottomEl">
              </abp-validation-summary>
            </div>
            <div class="form-group row">
              <label class="col-form-label-sm col-form-label col-5" for="width">{{ 'Width' | localize}}</label>
              <div class="col-7">
                <div class="input-group input-group-sm">
                  <input [readonly]="component.marginType !== MarginType.Custom" [(ngModel)]="component.width"
                    #widthModel="ngModel" #widthEl class="form-control form-control-sm" type="number" id="width"
                    name="width" [min]="0" />
                  <div class="input-group-append">
                    <span class="input-group-text">px</span>
                  </div>
                </div>
              </div>
              <abp-validation-summary [control]="widthModel" [controlEl]="widthEl">
              </abp-validation-summary>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

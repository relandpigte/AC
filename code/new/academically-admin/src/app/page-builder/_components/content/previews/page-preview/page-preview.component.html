<ng-container *ngIf="content.sections && content.sections.length">
  <div [dragula]="this.sortableId" [(dragulaModel)]='content.sections'>
    <div *ngFor="let section of content.sections">
      <app-content-preview [content]="section"></app-content-preview>
    </div>
  </div>
</ng-container>
<div class="actions">
  <a href="#" (click)="$event.preventDefault(); $event.stopPropagation(); onAddClick();">
    <i class="fe fe-plus"></i>
    {{ 'AddSection' | localize | titlecase }}
  </a>
</div>

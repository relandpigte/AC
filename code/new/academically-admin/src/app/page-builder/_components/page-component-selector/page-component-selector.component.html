<div class="modal-card card">
  <abp-modal-header [title]="'ChooseYourComponent' | localize" (onCloseClick)="onCancelClick()">
  </abp-modal-header>
  <div class="card-body">
    <button *ngFor="let pageComponent of pageComponents"
      [class.btn-primary]="selectedPageComponent.name === pageComponent.name"
      [class.btn-white]="selectedPageComponent.name !== pageComponent.name" class="btn page-component"
      (click)="onSelectPageComponent(pageComponent)">
      <i [class]="pageComponent.icon"></i>
      <p>{{ pageComponent.name | localize }}</p>
    </button>
  </div>
  <div class="card-footer justify-content-between">
    <button type="button" class="btn btn-white" (click)="onCancelClick()">
      {{ 'Cancel' | localize }}
    </button>
    <button type="submit" class="btn btn-primary" [disabled]="!selectedPageComponent.name" (click)="onOkayClick()">
      {{ 'Okay' | localize }}
    </button>
  </div>
</div>

<div class="card-body rating">
    <div class="rating-success text-center">
        <img class="rating-success-img" src="assets/img/events/completed-icon.svg" alt="Success">
        <div class="rating-success-title">{{ 'ReviewSubmitted' | localize }}</div>
        <div class="rating-success-message">{{ 'CoachingReviewMessage' | localize }}</div>
        <div class="d-flex justify-content-end rating-success-button gap-15">
            <button type="submit" class="btn btn-outline-secondary" (click)="handleGoToReviews()">
                {{ 'GoToReviews' | localize }}
            </button>
            <button type="submit" class="btn btn-primary" (click)="handleClose()">
                {{ 'Done' | localize }}
            </button>
        </div>
    </div>
</div>

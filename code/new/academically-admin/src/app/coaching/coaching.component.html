<div [@routerTransition]>
    <div class="container-fluid coaching-content d-flex flex-row flex-nowrap mb-5">
        <div class="coaching-content-left flex-grow-1">
            <div class="row">
                <div class="col col-sm-12">
                    <router-outlet></router-outlet>
                </div>
            </div>
        </div>
        <div class="coaching-content-right">
            <div class="row">
                <div class="col col-sm-12">
                    <ng-container *ngIf="isAboutTab">
                        <app-review-badge [rating]="rating"></app-review-badge>
                        <app-leave-review-badge [data]="data"></app-leave-review-badge>
                        <app-about-coach [data]="data" ></app-about-coach>
                        <app-about-related-coaching [data]="data"></app-about-related-coaching>
                    </ng-container>
                    <ng-container *ngIf="isDiscussionTab">
                        <app-coach-badge [data]="data"></app-coach-badge>
                        <app-session-badge [data]="data"></app-session-badge>
                        <app-about-related-coaching [data]="data" ></app-about-related-coaching>
                    </ng-container>
                    <ng-container *ngIf="isReviewsTab">
                        <app-review-stats [data]="data"></app-review-stats>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card custom-card-border custom-card-shadow">
    <app-shimmer [show]="isLoading$ | async" [shimmerType]="shimmerType.LandingRightAuthor"></app-shimmer>
    <div class="card-body text-center">
        <img [alt]="profileFullName" class="avatar-img rounded-circle" [src]="profilePictureUrl | async" />
        <h5 class="card-title">{{ profileFullName }}</h5>
        <p class="card-text">{{ profileAboutText }}</p>
        <a href="#" class="btn btn-light btn-sm">Coach</a>
    </div>

    <div class="card-footer d-flex justify-content-between">
        <div class="coach-status online d-flex gap-5"><span>●</span>Online</div>
        <div *ngIf="!isOwner">
            <button class="btn btn-outline-primary btn-sm coach-message" (click)="onMessageClick()"> {{ 'Message' | localize }}</button>
        </div>
    </div>
</div>

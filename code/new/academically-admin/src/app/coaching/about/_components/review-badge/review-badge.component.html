<div *ngIf="hasReviewed" class="card rating custom-card-border custom-card-shadow">
    <div class="card-body rating-body">
        <div class="rating">
            <span class="rating-points d-block w-100 text-center">{{ rating | number : '1.1-1'}}</span>
            <h6 class="rating-title text-center text-uppercase">{{ 'YourSessionReview' | localize }}</h6>
            <div class="rating-stars d-flex justify-content-center">
                <app-star-rating-review [actualRating]="rating"></app-star-rating-review>
            </div>
        </div>
        <div class="rating-button">
            <button class="btn btn-primary w-100">{{ 'PurchaseAgain' | localize }}</button>
            <button class="btn btn-light w-100">{{ 'ExploreMore' | localize }}</button>
        </div>
    </div>
</div>

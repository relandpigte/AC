<div class="card custom-card-border custom-card-shadow">
    <app-shimmer [show]="isLoading$ | async" [shimmerType]="shimmerType.LandingLeftAbout"></app-shimmer>

    <div class="card-header">
        <div class="row align-items-center">
            <div class="col">
                <h4 class="card-header-title">{{ 'About the session' | localize }}</h4>
            </div>
        </div>
    </div>

    <div class="card-body">
        <div class="card-body-calendar">
            <span role="button"><i class="fe fe-calendar mr-2"></i>Book by yourself</span>
        </div>
        <div class="card-body-duration">
            <span><i class="fe fe-clock mr-2"></i><strong>Duration</strong>: 2 hours</span>
        </div>
        <div class="card-body-ratings d-flex gap-10">
            <app-star-rating [actualRating]="4.2"></app-star-rating>
            <span>4.2/5.0</span>
        </div>
        <div class="card-body-text">
            Lorem ipsum dolor sit amet, consectetur adipiscing do dolore elit, ut so labore sed do eiusmod venitem por
            incididunt dout labore et do dolore magna aliqua. incididunt dout labore et do dolore magna aliqua.
        </div>
        <div class="card-body-tags d-flex gap-10">
            <button class="btn btn-light btn-sm">#Subatomic</button>
            <button class="btn btn-light btn-sm">#Molecular</button>
            <button class="btn btn-light btn-sm">#Chemistry</button>
            <button class="btn btn-light btn-sm">#Administration</button>
        </div>
    </div>
</div>

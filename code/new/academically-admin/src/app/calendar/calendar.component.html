<div class="container-fluid" [@routerTransition]>
  <div class="row justify-content-center">
    <div class="col-12">
      <div class="header">
        <div class="header-body">
          <div class="row align-items-center">
            <div class="col">
              <h6 class="header-pretitle">{{ 'ManageYourEvents' | localize }}</h6>
              <h1 class="header-title"><span *ngIf="user.id">{{ user.fullName }}'s Calendar</span></h1>
            </div>
            <div class="col-auto">

              <select class="custom-select" [disabled]="isLoading" select2 [defaultValue]="user.timeZoneId"
                (select2ValueChange)="onTimeZoneChange($event)" [(ngModel)]="user.timeZoneId" id="timeZoneId"
                name="timeZoneId" #timeZoneIdModel="ngModel" #timeZoneIdEl required>
                <option *ngFor="let timeZone of timeZones" [value]="timeZone.id">
                  {{ timeZone.name }}
                </option>
              </select>

            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-8 col-lg-9">
          <div class="card">
            <div class="card-body" [loader]="isLoading">
              <full-calendar #calendar [options]="calendarOptions"></full-calendar>
            </div>
          </div>
        </div>
        <div class="col-md-4 col-lg-3">
          <div class="card">
            <div class="card-body" [loader]="isLoading">
              <div class="list-group list-group-flush my-n3">
                <div class="list-group-item">
                  <div class="row align-items-center">
                    <div class="col ms-n2">
                      <h4 class="mb-1">
                        <a href="profile-posts.html">Dianna Smiley</a>
                        <a href="project-overview.html" class="small">View all</a>
                      </h4>

                      <p class="card-text small">

                      </p>

                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>


    </div>
  </div>
</div>

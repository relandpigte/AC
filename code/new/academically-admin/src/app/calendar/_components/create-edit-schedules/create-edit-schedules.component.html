<form class="form-horizontal" autocomplete="off" #form="ngForm" (ngSubmit)="onFormSubmit()">

  <div class="modal-card card">

    <div class="card-header">
      <h4 class="card-header-title">
        {{ DayOfWeek[selectedDayOfWeek] }} {{ 'Schedule' | localize }}
      </h4>
      <button type="button" class="close" aria-label="Close" (click)="onCloseClick()">
        <span aria-hidden="true">×</span>
      </button>
    </div>

    <div class="card-body" [loader]="isLoading">
      <div class="row">
        <div class="col-auto dow-menu">
          <ul class="nav nav-pills flex-column">
            <li *ngFor="let dayOfWeek of DayOfWeek | enumToArray | keyvalue" class="nav-item">
              <a [class.active]="selectedDayOfWeek == dayOfWeek.key"
                (click)="$event.preventDefault(); onDayOfWeekClick(dayOfWeek.key)" class="nav-link" href="#!">
                {{ dayOfWeek.value }}
              </a>
            </li>
          </ul>
        </div>
        <div class="col d-flex justify-content-center align-items-center">
          <div>
            <div class="form-group">
              <div class="form-check">
                <input [(ngModel)]="model.isAvailable" class="form-check-input" type="checkbox" value=""
                  id="isAvailable" name="isAvailable" required>
                <label class="form-check-label" for="isAvailable">
                  {{ 'Available' }}?
                </label>
              </div>
            </div>
            <div class="form-row">

              <div class="form-group col-6">
                <label class="col-form-label" for="startTime">{{ 'StartTime' | localize}}</label>
                <timepicker [(ngModel)]="startTime" [disabled]="!model.isAvailable" id="startTime" name="startTime"
                  #startTimeModel="ngModel" #startTimeEl [minuteStep]="30" (ngModelChange)="onStartTimeChange()"
                  required>
                </timepicker>
              </div>

              <div class="form-group col-6">
                <label class="col-form-label" for="endTime">{{ 'EndTime' | localize}}</label>
                <timepicker [(ngModel)]="endTime" [disabled]="!model.isAvailable" id="endTime" name="endTime"
                  #endTimeModel="ngModel" #endTimeEl [minuteStep]="30" (ngModelChange)="onEndTimeChange()" required>
                </timepicker>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
    <abp-modal-footer [isLoading]="isLoading" [cancelDisabled]="isLoading" [saveDisabled]="isLoading"
      (onCancelClick)="onCloseClick()">
    </abp-modal-footer>
  </div>
</form>

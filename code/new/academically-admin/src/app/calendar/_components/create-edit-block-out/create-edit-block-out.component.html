<form class="form-horizontal" autocomplete="off" #form="ngForm" (ngSubmit)="onFormSubmit()">
  <div class="modal-card card">
    <abp-modal-header [title]="(!model.id ? 'AddBlockOut' : 'EditBlockOut') | localize" (onCloseClick)="onCloseClick()">
    </abp-modal-header>
    <div class="card-body">

      <div class="form-group mb-2 d-flex justify-content-between">
        <label class="col-form-label">{{ 'Date' | localize}}: {{ startTime | date: 'MMMM d, yyyy' }}</label>
        <label class="col-form-label">{{ 'Duration' | localize}}: {{ durationText }}</label>
      </div>

      <div class="form-group required">
        <label class="col-form-label" for="title">{{ 'Title' | localize}}</label>
        <input [(ngModel)]="model.title" #titleModel="ngModel" #titleEl class="form-control" type="text" id="title"
          name="title" required />
        <abp-validation-summary [control]="titleModel" [controlEl]="titleEl">
        </abp-validation-summary>
      </div>

      <div class="form-row">

        <div class="form-group col-6 required">
          <label class="col-form-label" for="startTime">{{ 'StartTime' | localize}}</label>
          <timepicker [(ngModel)]="startTime" id="startTime" name="startTime" #startTimeModel="ngModel" #startTimeEl
            [minuteStep]="1" (ngModelChange)="onStartTimeChange()" required>
          </timepicker>
        </div>

        <div class="form-group col-6 required">
          <label class="col-form-label" for="endTime">{{ 'EndTime' | localize}}</label>
          <timepicker [(ngModel)]="endTime" id="endTime" name="endTime" #endTimeModel="ngModel" #endTimeEl
            [minuteStep]="1" (ngModelChange)="onEndTimeChange()" required>
          </timepicker>
        </div>

      </div>

      <div class="form-group required">
        <label class="col-form-label" for="recurrence">{{ 'Recurrence' | localize }}</label>
        <select class="custom-select" select2 [defaultValue]="model.recurrence"
          (select2ValueChange)="model.recurrence = $event" [(ngModel)]="model.recurrence" id="recurrence"
          name="recurrence" #recurrenceModel="ngModel" #recurrenceEl required>
          <option *ngFor="let relationship of CalendarEventRecurrence | enumToArray | keyvalue"
            [value]="relationship.key">
            {{ relationship.value | localize }}
          </option>
        </select>
        <abp-validation-summary [control]="recurrenceModel" [controlEl]="recurrenceEl">
        </abp-validation-summary>
      </div>

    </div>
    <abp-modal-footer [isLoading]="isLoading" [cancelDisabled]="isLoading"
      [saveDisabled]="!form.form.valid || duration <= 0 || isLoading" (onCancelClick)="onCloseClick()">
    </abp-modal-footer>
  </div>
</form>

<div class="d-flex flex-column h-100">

  <ul class="navbar-nav list-group">
    <ng-container *ngFor="let studentCourseSection of studentCourseSections">
      <li class="nav-item list-group-item">
        <a href="javascript:;" class="nav-link" role="button">
          <h3 class="m-0 py-2">{{ studentCourseSection.courseSection.name }}</h3>
        </a>
      </li>
      <ng-container *ngFor="let unit of studentCourseSection.courseSection.children">
        <li class="nav-item list-group-item">
          <a href="javascript:;" class="nav-link" role="button">
            <p class="m-0 small"><b>{{ unit.name }}</b></p>
          </a>
        </li>
        <ng-container *ngFor="let lesson of unit.children">
          <li class="nav-item list-group-item">
            <a href="javascript:;" class="nav-link" role="button">
              <div class="d-flex">
                <div class="avatar avatar-4by3">
                  <img [src]="getCourseImageUrl(lesson.courseImageUrl)" alt="..." class="avatar-img rounded">
                </div>
                <div class="d-flex align-items-center ml-3">
                  <p class="m-0 small"><b>{{ lesson.name }}</b></p>
                </div>
              </div>
            </a>
          </li>
        </ng-container>
      </ng-container>
    </ng-container>
  </ul>

  <div class="mt-auto"></div>

  <div class="d-flex justify-content-between align-items-center mt-5">
    <a [routerLink]="['home']">
      <i class="fe fe-arrow-left"></i> {{ 'Exit' |localize }}
    </a>
  </div>
</div>

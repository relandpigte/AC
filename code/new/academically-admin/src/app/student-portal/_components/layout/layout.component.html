<div [@routerTransition] class="h-100">
  <button class="btn btn-sm btn-rounded-circle btn-white btn-sidebar-show d-none">
    <i class="fe fe-chevron-right"></i>
  </button>
  <div sidebarCollapse class="portal-sidebar navbar-light navbar-vertical">
    <button class="btn btn-sm btn-rounded-circle btn-white btn-sidebar-collapse">
      <i class="fe fe-chevron-left"></i>
    </button>
    <div class="portal-sidebar-container">
      <a class="portal-sidebar-top navbar-brand" href="javascript:;">
        <div class="d-flex">
          <div class="avatar avatar-4by3">
            <img [src]="getCourseImageUrl(model.courseImageUrl)" alt="..." class="avatar-img rounded">
          </div>
          <div class="portal-sidebar-header">
            <h6 class="header-pretitle">{{ 'Courses' | localize }}</h6>
            <h3 class="header-title">{{ model.name }}</h3>
          </div>
        </div>
        <div class="d-flex align-items-center mt-3">
          <div class="col-auto p-0">
            <p class="small mb-0 mr-2">30%</p>
          </div>
          <div class="col p-0">
            <div class="progress progress-sm">
              <div class="progress-bar" role="progressbar" style="width: 30%"></div>
            </div>
          </div>
        </div>
      </a>

      <div class="portal-sidebar-content">
        <router-outlet name="menu"></router-outlet>
      </div>
    </div>
  </div>

  <div class="main-content h-100">
    <router-outlet></router-outlet>
  </div>
</div>

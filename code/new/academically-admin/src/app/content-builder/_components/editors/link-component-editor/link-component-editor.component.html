<div class="form-group">
  <label class="col-form-label pt-0" for="name">{{ 'Text' | localize }}</label>
  <input type="text" name="text" id="text" [(ngModel)]="component.text" class="form-control">
</div>
<div class="form-group">
  <label class="col-form-label pt-0" for="url">{{ 'Url' | localize }}</label>
  <input type="text" name="url" id="url" [(ngModel)]="component.url" class="form-control">
</div>

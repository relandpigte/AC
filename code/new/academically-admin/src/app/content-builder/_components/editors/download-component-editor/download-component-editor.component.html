<div class="card">
  <div class="card-header">
    <h4 class="card-header-title">
      {{ 'UploadDocument' | localize }}
    </h4>
  </div>
  <div class="card-body" [loader]="isLoading">
    <app-document-uploader [maxFiles]="1" [cropImages]="true" [allowedExtensions]="fileExtensions">
    </app-document-uploader>
  </div>
</div>

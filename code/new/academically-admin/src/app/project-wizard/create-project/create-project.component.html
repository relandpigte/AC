<div class="container-fluid" [@routerTransition]>
  <div class="row mt-5 pt-5 text-center">
    <div class="col-md-12">
      <p class="text-muted">
        <ng-container *ngTemplateOutlet="stepInfo"></ng-container>
      </p>
    </div>
    <div class="col-md-12 header mt-md-5">
      <div class="header-body">
        <h1 class="header-title mb-4">
          {{ createProjectDto.serviceNameLevel3 }}
        </h1>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12 header" [loader]="isLoading">
      <div class="header-body">
        <div class="row justify-content-center">
          <div class="col-md-7 header">
            <form class="row" autocomplete="off" #createEditForm="ngForm" (ngSubmit)="onFormSubmit()">
              <div class="col-md-12">
                <div class="form-group m-1 p-3 required">
                  <label class="col-form-label" for="ProjectName">{{ 'ProjectName' | localize }}</label>
                  <input [(ngModel)]="createProjectDto.name" id="ProjectName" name="ProjectName" type="text"
                    class="form-control" #projectNameModel="ngModel" #projectNameEl required />
                  <abp-validation-summary [control]="projectNameModel" [controlEl]="projectNameEl">
                  </abp-validation-summary>
                </div>
              </div>
            </form>
          </div>
          <div class="col-md-7">
            <div class="p-3 m-1">
              <app-availability-setting></app-availability-setting>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="d-flex justify-content-between mb-4">
    <button (click)="onBackClick()" type="button" class="btn btn-white">
      {{ 'Back' | localize }}
    </button>
    <p class="text-muted m-0 align-self-center">
      <ng-container *ngTemplateOutlet="stepInfo"></ng-container>
    </p>
    <button type="button" (click)="onFormSubmit()" class="btn btn-primary">
      {{ 'Create' | localize }}
    </button>
  </div>
</div>
<ng-template #stepInfo>{{ 'step' | localize | titlecase }} 4 {{ 'of' | localize | titlecase }} 4</ng-template>

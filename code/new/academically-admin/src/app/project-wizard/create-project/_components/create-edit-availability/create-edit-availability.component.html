<form class="form-horizontal" autocomplete="off" #createEditUserEducationForm="ngForm" (ngSubmit)="onFormSubmit()">
  <div class="modal-card card">
    <div class="card-header">
      <h4 class="card-header-title">
        Add Availability
      </h4>
      <button type="button" class="close" aria-label="Close" (click)="onCloseClick()">
        <span aria-hidden="true">×</span>
      </button>
    </div>
    <div class="card-body">
      <div class="row">
        <div class="col-12">
          <div class="btn-group-toggle d-flex justify-content-between mb-3">
            <div class="p-2">
              <input  type="radio" class="btn-check" name="options" id="weekendEvenings" autocomplete="off">
              <label (click)="onAvailabilityChange('endeve')" class="btn btn-white" for="weekendEvenings">
                Weekend Evenings
              </label>
            </div>

            <div class="p-2">
              <input type="radio" class="btn-check" name="options" id="weekendMornings" autocomplete="off">
              <label (click)="onAvailabilityChange('endmor')" class="btn btn-white" for="weekendMornings">
                Weekend Mornings
              </label>
            </div>

            <div class="p-2">
              <input type="radio" class="btn-check" name="options" id="weekdayEvenings" autocomplete="off">
              <label (click)="onAvailabilityChange('dayeve')" class="btn btn-white" for="weekdayEvenings">
                Weekday Evenings
              </label>
            </div>

            <div class="p-2">
              <input type="radio" class="btn-check" name="options" id="weekdayMornings" autocomplete="off">
              <label (click)="onAvailabilityChange('daymor')" class="btn btn-white" for="weekdayMornings">
                Weekday Mornings
              </label>
            </div>
          </div>
        </div>
        <div class="col-auto dow-menu">
          <div *ngFor="let dayOfWeek of DayOfWeek | enumToArray | keyvalue" class="form-check">
            <input (change)="onDayOfWeekSelected(+dayOfWeek.key, $event.target.checked)" class="form-check-input"
              type="checkbox" id="dof_{{ dayOfWeek.key }}" name="dof_{{ dayOfWeek.key }}" [value]="dayOfWeek.key"
              [checked]="dayOfWeeks.includes(+dayOfWeek.key)">
            <label for="dof_{{ dayOfWeek.key }}" class="form-check-label">{{ dayOfWeek.value }}</label>
          </div>
        </div>
        <div class="col d-flex justify-content-center align-items-center">
          <div class="form-row">
            <div class="form-group col-6">
              <label class="col-form-label" for="startTime">{{ 'StartTime' | localize}}</label>
              <timepicker [(ngModel)]="startTime" id="startTime" name="startTime" #startTimeModel="ngModel" #startTimeEl
                [minuteStep]="30" required>
              </timepicker>
            </div>
            <div class="form-group col-6">
              <label class="col-form-label" for="endTime">{{ 'EndTime' | localize}}</label>
              <timepicker [(ngModel)]="endTime" id="endTime" name="endTime" #endTimeModel="ngModel" #endTimeEl
                [minuteStep]="30" required>
              </timepicker>
            </div>

          </div>
        </div>
      </div>
    </div>
    <abp-modal-footer (onCancelClick)="onCloseClick()" [saveDisabled]="!dayOfWeeks.length">
    </abp-modal-footer>
  </div>
</form>

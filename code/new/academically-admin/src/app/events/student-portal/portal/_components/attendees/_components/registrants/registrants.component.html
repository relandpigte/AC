<table class="table table-sm table-sm-custom mb-0">
  <thead>
    <tr>
      <th>
        <div class="row">
          <div class="col flex-y-center">
            {{ 'WaitingRoom' | localize }}
          </div>
          <div class="col-auto flex-y-center actions">
            <div class="dropdown">
              <a href="#" class="dropdown-ellipses dropdown-toggle" role="button" data-toggle="dropdown"
                aria-haspopup="true" aria-expanded="false">
                <i class="fe fe-more-vertical"></i>
              </a>
              <div class="dropdown-menu dropdown-menu-right">
                <a href="#!visit" class="dropdown-item text-transform-none" (click)="$event.preventDefault();">
                  <small>{{ 'AdmitAll' | localize }}</small>
                </a>
              </div>
            </div>
          </div>
        </div>
      </th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let presenter of waitingPresenters">
      <td>
        <div class="row">
          <div class="col flex-y-center">
            <div class="avatar avatar-sm d-inline-block me-2">
              <img [src]="getProfilePictureUrl(presenter.user.profilePictureDocument)" alt="..."
                class="avatar-img rounded-circle">
            </div>
            <p class="m-0 ml-3">
              <b>{{ presenter.user.fullName }}</b>
            </p>
          </div>
          <div class="col-auto flex-y-center">
            <button (click)="onAdmitClick(presenter)" class=" btn btn-sm btn-primary">
              {{ 'Admit' | localize }}
            </button>
          </div>
        </div>
      </td>
    </tr>
    <tr *ngIf="!waitingPresenters || !waitingPresenters.length">
      <td colspan="10">
        <p class="m-0 p-2 text-muted text-center">
          {{ 'NoOneFound' | localize }}
        </p>
      </td>
    </tr>
  </tbody>
</table>

<table class="table table-sm table-sm-custom mb-0">
  <thead>
    <tr>
      <th>
        <div class="row">
          <div class="col flex-y-center">
            {{ 'NotJoined' | localize }}
          </div>
          <div class="col-auto flex-y-center actions">
            <div class="dropdown">
              <a href="#" class="dropdown-ellipses dropdown-toggle" role="button" data-toggle="dropdown"
                aria-haspopup="true" aria-expanded="false">
                <i class="fe fe-more-vertical"></i>
              </a>
              <div class="dropdown-menu dropdown-menu-right">
                <a href="#!visit" class="dropdown-item text-transform-none" (click)="$event.preventDefault();">
                  <small>{{ 'MessageAll' | localize }}</small>
                </a>
              </div>
            </div>
          </div>
        </div>
      </th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let audience of audiences">
      <td>
        <div class="row">
          <div class="col flex-y-center">
            <div class="avatar avatar-sm d-inline-block me-2">
              <img [src]="getProfilePictureUrl(audience.creatorUser.profilePictureDocument)" alt="..."
                class="avatar-img rounded-circle">
            </div>
            <p class="m-0 ml-3">
              <b>{{ audience.creatorUser.fullName }}</b>
            </p>
          </div>
          <div class="col-auto flex-y-center">
            <button class="btn btn-sm btn-outline-primary">
              {{ 'Message' | localize }}
            </button>
          </div>
        </div>
      </td>
    </tr>
    <tr *ngFor="let presenter of presenters">
      <td>
        <div class="row">
          <div class="col flex-y-center">
            <div class="avatar avatar-sm d-inline-block me-2">
              <img [src]="getProfilePictureUrl(presenter.user.profilePictureDocument)" alt="..."
                class="avatar-img rounded-circle">
            </div>
            <p class="m-0 ml-3">
              <b>{{ presenter.user.fullName }}</b>
            </p>
          </div>
          <div class="col-auto flex-y-center">
            <button class="btn btn-sm btn-outline-primary">
              {{ 'Message' | localize }}
            </button>
          </div>
        </div>
      </td>
    </tr>
    <tr *ngIf="(!audiences || !audiences.length) && (!presenters || !presenters.length)">
      <td colspan="10">
        <p class="m-0 p-2 text-muted text-center">
          {{ 'NoOneFound' | localize }}
        </p>
      </td>
    </tr>
  </tbody>
</table>

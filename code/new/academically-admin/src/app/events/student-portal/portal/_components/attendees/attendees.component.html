<ul *ngIf="isTutor" class="nav nav-tabs nav-tabs-sm px-3">
  <li class="nav-item">
    <a href="#" class="nav-link active" id="live-tab" data-toggle="tab" href="#live-container" role="tab"
      aria-controls="live-container" aria-selected="true">
      {{ 'Live' | localize }}
    </a>
  </li>
  <li class="nav-item">
    <a href="#" class="nav-link" id="registants-tab" data-toggle="tab" href="#registants-container" role="tab"
      aria-controls="registants-container" aria-selected="true">
      {{ 'Registrants' | localize }}
    </a>
  </li>
  <li class="nav-item">
    <a href="#" class="nav-link" id="speak-requests-tab" data-toggle="tab" href="#speak-requests-container" role="tab"
      aria-controls="speak-requests-container" aria-selected="true">
      {{ 'SpeakRequests' | localize }}
    </a>
  </li>
</ul>
<div *ngIf="isTutor" class="tab-content">
  <div class="tab-pane fade show active" id="live-container" role="tabpanel" aria-labelledby="live-tab">
    <app-live></app-live>
  </div>
  <div class="tab-pane fade" id="registants-container" role="tabpanel" aria-labelledby="registants-tab">
    <app-registrants></app-registrants>
  </div>
  <div class="tab-pane fade" id="speak-requests-container" role="tabpanel" aria-labelledby="speak-requests-tab">
    <app-speak-requests></app-speak-requests>
  </div>
</div>


<app-live *ngIf="!isTutor"></app-live>

<div class="card custom-card-border custom-card-shadow">
    <app-shimmer [show]="isLoading$ | async" [shimmerType]="shimmerType.LandingLeftAbout"></app-shimmer>
    <div class="card-header">
        <div class="row align-items-center">
            <div class="col">
                <h4 class="card-header-title">{{ 'About the session' | localize }}</h4>
            </div>
        </div>
    </div>

    <div class="card-body">
        <div class="card-body-calendar">
            <i class="fe fe-calendar mr-2"></i>
            <span class="date font-weight-bold text-primary mr-3">FRIDAY, 23 AUG 2022 FROM 18:00-21:00</span>
            <span *ngIf="isWorkShop" class="space text-danger">{{ spaceLeft }} space left</span>
        </div>
        <div class="card-body-duration">
            <span><i class="fe fe-clock mr-2"></i><strong>Duration</strong>: 2 hours</span>
        </div>
        <div class="card-body-text">
            {{ description }}
        </div>
        <div class="card-body-tags d-flex flex-wrap gap-10">
            <span class="btn btn-light btn-sm">#Subatomic</span>
            <span class="btn btn-light btn-sm">#Molecular</span>
            <span class="btn btn-light btn-sm">#Chemistry</span>
            <span class="btn btn-light btn-sm">#Administration</span>
        </div>
    </div>
</div>

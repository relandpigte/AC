<div class="container-fluid" [@routerTransition]>
  <div class="row justify-content-center">
    <div class="col-12">
      <div class="header">
        <div class="header-body">
          <div class="row align-items-center">
            <div class="col">
              <h6 *ngIf="model.parent" class="header-pretitle">{{ model.parent.name | localize }}</h6>
              <h6 *ngIf="!model.parent" class="header-pretitle">{{ 'Event' | localize }}</h6>
              <h1 class="header-title">{{ model.name }}</h1>
            </div>
            <div class="col-auto">
              <div class="d-flex align-items-center justify-content-center">
                <button (click)="$event.preventDefault(); onLessonPreviewClick()" class="btn btn-outline-primary">
                  {{ 'EventPreview' | localize | titlecase }}
                </button>
                <button *ngIf="model.status === EventStatus.Draft" (click)="onPublishClick()"
                  class="btn btn-primary ml-2">
                  {{ 'Publish' | localize | titlecase }}
                </button>
                <button *ngIf="model.status === EventStatus.Published" (click)="onUnpublishClick()"
                  class="btn btn-outline-success ml-2">
                  {{ 'Draft' | localize | titlecase }}
                </button>
              </div>
            </div>
          </div>
          <div class="row align-items-center">
            <div class="col">
              <ul class="nav nav-tabs nav-overflow header-tabs">
                <li class="nav-item">
                  <a [routerLink]="['details']" routerLinkActive="active" class="nav-link">
                    {{ 'Details' | localize }}
                  </a>
                </li>
                <li class="nav-item">
                  <a [routerLink]="['settings']" routerLinkActive="active" class="nav-link">
                    {{ 'Settings' | localize }}
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <router-outlet></router-outlet>
    </div>
  </div>
</div>

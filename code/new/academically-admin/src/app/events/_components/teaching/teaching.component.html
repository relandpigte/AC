<div class="card">
  <div class="card-header">
    <ul class="mr-4 nav nav-tabs nav-tabs-sm card-header-tabs">
      <li class="nav-item">
        <a class="nav-link" id="schedule-tab" data-toggle="tab" href="#schedule-container" role="tab"
          aria-controls="schedule-container" aria-selected="true">
          {{ 'Schedule' | localize}}
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" id="events-tab" data-toggle="tab" href="#events-container" role="tab"
          aria-controls="evenevents-containerts" aria-selected="true">
          {{ 'Events' | localize}}
        </a>
      </li>
    </ul>
  </div>

  <div class="tab-content">
    <div class="tab-pane" id="schedule-container" role="tabpanel" aria-labelledby="schedule-tab">
      <app-schedule-list></app-schedule-list>
    </div>
    <div class="tab-pane fade show active" id="events-container" role="tabpanel" aria-labelledby="events-tab">
      <app-event-list></app-event-list>
    </div>
  </div>
</div>

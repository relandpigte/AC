<div class="row">
  <div *ngFor="let event of events" class="col-12">
    <div class="card">
      <div class="card-body">
        <div class="row align-items-center">
          <div class="col-auto">
            <a href="#!visit" class="avatar avatar-lg avatar-4by3" (click)="$event.preventDefault();">
              <img [src]="getServiceImageUrl(event.thumbnailDocument)" alt="..." class="avatar-img rounded">
            </a>
          </div>
          <div class="col ml-n2">
            <div class="pill-container d-flex">
              <div class="pill" [class.red]="isOwner(event)">
                <div class="pill-text">{{ (isOwner(event) ? 'Teaching' : 'Learning') | localize | uppercase }}</div>
              </div>
            </div>
            <h4 class="name mb-0">
              <a *ngIf="event.creatorUserId === appSession.userId" href="#!visit"
                (click)="$event.preventDefault(); navToUrl('app/events' , event.id)">
                {{ event.name }}
              </a>
              <a *ngIf="event.creatorUserId !== appSession.userId" href="#!visit" (click)="$event.preventDefault();">
                {{ event.name }}
              </a>
            </h4>
            <p class="card-text small text-muted mb-0">
              <time datetime="2018-06-21">
                {{ 'Created' | localize }} {{ convertMomentToDateAgo(event.eventDateTime) }}
              </time>
            </p>
          </div>
          <div class="col-auto">
            <button *ngIf="event.creatorUserId === appSession.userId" (click)="navToUrl('app/events' , event.id)"
              class="btn btn-outline-primary btn-sm mr-2">
              {{ 'Edit' | localize }}
            </button>
            <button [routerLink]="['/app/events/student-portal', event.id, 'portal']" type="button"
              class="btn btn-primary btn-sm">
              {{ 'Join' | localize }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

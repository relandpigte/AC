<div class="header coaching-header position-relative">
    <div class="container coaching-event-type position-absolute">
        <span class="event-type badge rounded-pill text-white position-absolute">{{ eventCategoryName }}</span>
    </div>

    <app-shimmer [show]="isLoading$ | async" [shimmerType]="shimmerType.LandingHeader" backgroundColor="#f9fbfd"></app-shimmer>
    <img [src]="getCoverPhoto(profileCoverPhotoUrl)" class="header-img-top" [alt]="profileFullName" />

    <div [class.container]="themeSettings.navigationPosition === NavigationPosition.Topnav"
         [class.container-fluid]="themeSettings.navigationPosition !== NavigationPosition.Topnav">
        <div class="header-body mt-n5 mt-md-n6 position-relative">
            <div class="row align-items-end">
                <div class="col-auto">
                    <div class="avatar avatar-xxl header-avatar-top">
                        <div class="rounded bg-white d-flex flex-column align-items-center justify-content-center custom-card-shadow">
                            <span class="day">15</span>
                            <span class="month">May</span>
                        </div>
                    </div>
                </div>
                <div class="col mb-3 ml-n3 ml-md-n2">
                    <h6 class="header-pretitle">{{ eventCategoryName }}</h6>
                    <h1 class="header-title">{{ eventTitle | titlecase }}</h1>
                </div>
                <div class="col-12 col-md-auto mt-2 mt-md-0 mb-md-3 d-flex">
                    <button class="btn btn-primary d-block d-md-inline-block custom-button-width" (click)="onPurchase(data, true)" [class.btn-disabled]="isPurchased">
                        {{ isPurchased ? 'Purchased' : price | currency: 'GBP' }}
                    </button>
                    <button class="btn btn-light d-block d-md-inline-block custom-button-width" (click)="handleSaveClick()" [class.btn-disabled]="isSaved">
                        {{ isSaved ? 'Saved' : 'Save' | localize }}
                    </button>
                    <div class="dropup">
                        <button class="btn btn-light d-block d-md-inline-block" data-toggle="dropdown">
                            <span class="d-inline-block bg-center" [ngStyle]="{'background-image': 'url(assets/img/icon-share.svg)', 'width': '20px', 'height': '20px'}"></span>
                        </button>
                        <div class="dropdown-menu dropdown-menu-left" [style.margin-bottom.px]="2">
                            <div class="dropdown-item cursor-pointer" (click)="handleShareClick($event)">Share in post</div>
                            <div class="dropdown-item cursor-pointer" (click)="handleCopyLink($event)" data-toggle="dropdown">Copy link</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row align-items-center">
                <div class="col">
                    <ul class="nav nav-tabs nav-overflow header-tabs profile-menu">
                        <li class="nav-item">
                            <a [routerLink]="['about']" routerLinkActive="active" class="nav-link">
                                {{ 'About' | localize }}
                            </a>
                        </li>
                        <li class="nav-item">
                            <a [routerLink]="['discussion']" routerLinkActive="active" class="nav-link">
                                {{ 'Discussion' | localize }}
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<div [@routerTransition]>
    <div class="container-fluid coaching-content d-flex flex-row flex-nowrap mb-5">
        <div class="workshop-content-left flex-grow-1">
            <div class="row">
                <div class="col col-sm-12">
                    <router-outlet></router-outlet>
                </div>
            </div>
        </div>
        <div class="workshop-content-right">
            <div class="row">
                <div class="col col-sm-12">
                    <ng-container *ngIf="isAboutTab">
                        <app-organizer-badge [data]="data"></app-organizer-badge>
                        <app-attendees-badge [data]="data"></app-attendees-badge>
                        <app-related-events-badge [data]="data"></app-related-events-badge>
                    </ng-container>
                    <ng-container *ngIf="isDiscussionTab">
                        <app-organizer-badge [data]="data"></app-organizer-badge>
                        <app-session-badge [data]="data"></app-session-badge>
                        <app-attendees-badge [data]="data"></app-attendees-badge>
                        <app-related-events-badge [data]="data"></app-related-events-badge>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="app-color-picker-container">

    [cpOKButtonClass]="'btn btn-sm btn-primary'" [style.background-color]="color">
    <p class="app-color-picker-info">{{ 'ClickHereToChooseColor' | localize }}</p>
  </div>
</div>

<div class="modal-card card" [loader]="isLoading">
  <abp-modal-header [title]="'CoverPhotoGallery' | localize" (onCloseClick)="onCloseClick()"></abp-modal-header>
  <div class="card-body">
    <div class="row">
      <div class="col-md-3">
        <div class="list-group list-group-flush images-container">
          <a *ngFor="let image of images" href="#" class="list-group-item list-group-item-action p-2"
            [class.active]="selectedImage === image" (click)="$event.preventDefault(); onImageClick(image);">
            <img [src]="imageRoot + image" alt="cover-photo" width="100%" height="auto">
          </a>
        </div>
      </div>
      <div class="col-md-9">
        <image-cropper *ngIf="selectedImageFile" #imageCropper [imageFile]="selectedImageFile"
          [maintainAspectRatio]="true" [autoCrop]="false" [aspectRatio]="1440/300" format="png">
        </image-cropper>
      </div>
    </div>
  </div>
  <div class="card-footer justify-content-between">
    <button [disabled]="isImageCropping" (click)="onCloseClick()" type="button" class="btn btn-white">
      {{ 'Cancel' | localize }}
    </button>
    <button (click)="onCropClick()" [disabled]="isImageCropping" type="submit" class="btn btn-primary">
      <span *ngIf="!isImageCropping">
        {{ 'Crop' | localize }}
      </span>
      <span *ngIf="isImageCropping">
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        {{ 'Cropping' }}
      </span>
    </button>
  </div>
</div>

<div class="modal-card card" [loader]="isLoading">
  <abp-modal-header [title]="'UploadHandout' | localize" (onCloseClick)="onCloseClick()">
  </abp-modal-header>
  <form autocomplete="off" #form="ngForm" (ngSubmit)="onFormSubmit()">
    <div class="card-body">
      <div class="form-group">
        <label class="col-form-label" for="name">{{ 'Name' | localize }}</label>
        <input [(ngModel)]="model.name" type="text" class="form-control" name="name" id="name" required
          #nameModel="ngModel" #nameEl />
        <abp-validation-summary [control]="nameModel" [controlEl]="nameEl"></abp-validation-summary>
      </div>
      <app-document-uploader [maxFiles]="1" [allowedExtensions]="allowedHandoutsExtension" [showUploadHint]="true"
        (filesChanged)="onFilesChange($event)">
      </app-document-uploader>
    </div>
    <abp-modal-footer [saveLabel]="'Upload' | localize" [cancelLabel]="'Back' | localize" [cancelDisabled]="isLoading"
      [saveDisabled]="isLoading || !document || !form.form.valid" (onCancelClick)="onCloseClick()">
    </abp-modal-footer>
  </form>
</div>

<app-shimmer
    [isBlock]="true"
    [show]="isLoading$ | async"
    [shimmerType]="shimmerType.DashboardCreated"
    backgroundColor="#f9fbfd"
></app-shimmer>

<ng-container *ngIf="!(isLoading$ | async)">
    <div class="card custom-card-border search">
        <div class="card-header border-0">
            <div class="d-flex align-items-center">
                <form>
                    <div class="input-group input-group-flush">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fe fe-search"></i>
                            </span>
                        </div>
                        <input class="list-search form-control" type="search" name="Search" placeholder="Search" />
                    </div>
                </form>
                <div class="search-nav d-flex ml-auto">
                    <ul class="nav nav-tabs nav-tabs-sm border-0">
                        <li class="nav-item">
                            <a href="javascript: void(0);" class="nav-link" [class.active]="activeTab === 'upcoming'" data-toggle="tab" role="tab" (click)="activeTab = 'upcoming'">
                                Upcoming <span class="badge badge-pill badge-light">{{ totalUpcomingEvents }}</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="javascript: void(0);" class="nav-link" [class.active]="activeTab === 'past'" data-toggle="tab" role="tab" (click)="activeTab = 'past'">
                                Past <span class="badge badge-pill badge-light">{{ totalPastEvents }}</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="javascript: void(0);" class="nav-link" [class.active]="activeTab === 'cancelled'" data-toggle="tab" role="tab" (click)="activeTab = 'cancelled'">
                                Cancelled <span class="badge badge-pill badge-light">{{ totalCancelledEvents }}</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="javascript: void(0);" class="nav-link" [class.active]="activeTab === 'draft'" data-toggle="tab" role="tab" (click)="activeTab = 'draft'">
                                Draft <span class="badge badge-pill badge-light">{{ totalDraftEvents }}</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-content">
        <div class="tab-pane fade" [ngClass]="{'show active' : activeTab === 'upcoming'}" id="upcoming-events" role="tabpanel">
            <ng-container *ngIf="!!totalUpcomingEvents else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of upcomingEvents"
                    [data]="data"
                    [isLoading]="isLoading"
                    [isCreator]="isTutor"
                    (onEdit)="onEditClick($event)"
                    (onDuplicate)="onDuplicateClick($event)"
                    (onDelete)="onDeleteClick($event)"
                    (onClickAction)="handleJoinClick($event)"
                    (onRedirection)="onRedirection($event, data.id)"
                    (onUnpublish)="onUpdateStatus($event, EventStatus.Draft)"
                ></app-service-card-dashboard>
            </ng-container>
        </div>

        <div class="tab-pane fade" [ngClass]="{'show active' : activeTab === 'past'}" id="past-events" role="tabpanel">
            <ng-container *ngIf="!!totalPastEvents else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of pastEvents"
                    [data]="data"
                    [isLoading]="isLoading"
                    [isCreator]="isTutor"
                    (onEdit)="onEditClick($event)"
                    (onDuplicate)="onDuplicateClick($event)"
                    (onDelete)="onDeleteClick($event)"
                    (onUnpublish)="onUpdateStatus($event, EventStatus.Draft)"
                ></app-service-card-dashboard>
            </ng-container>
        </div>

        <div class="tab-pane fade" [ngClass]="{'show active' : activeTab === 'cancelled'}" id="cancelled-events" role="tabpanel">
            <ng-container *ngIf="!!totalCancelledEvents else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of cancelledEvents"
                    [data]="data"
                    [isLoading]="isLoading"
                    [isCreator]="isTutor"
                    (onEdit)="onEditClick($event)"
                    (onDuplicate)="onDuplicateClick($event)"
                    (onDelete)="onDeleteClick($event)"
                ></app-service-card-dashboard>
            </ng-container>
        </div>

        <div class="tab-pane fade" [ngClass]="{'show active' : activeTab === 'draft'}" id="draft-events" role="tabpanel">
            <ng-container *ngIf="!!totalDraftEvents else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of draftEvents"
                    [data]="data"
                    [isLoading]="isLoading"
                    [isCreator]="isTutor"
                    (onEdit)="onEditClick($event)"
                    (onDuplicate)="onDuplicateClick($event)"
                    (onDelete)="onDeleteClick($event)"
                    (onPublish)="onUpdateStatus($event, EventStatus.Published)"
                ></app-service-card-dashboard>
            </ng-container>
        </div>
    </div>
</ng-container>

<ng-template #noRecords>
    <div class="text-center font-size-sm text-muted w-100">No records to display</div>
</ng-template>

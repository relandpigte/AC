<app-shimmer
    [isBlock]="true"
    [show]="isLoading$ | async"
    [shimmerType]="shimmerType.DashboardPurchased"
    backgroundColor="#f9fbfd"
></app-shimmer>

<ng-container *ngIf="!(isLoading$ | async)">

    <div class="card custom-card-border search">
        <div class="card-header border-0">
            <div class="row align-items-center">
                <div class="col">
                    <form>
                        <div class="input-group input-group-flush">
                            <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fe fe-search"></i>
                            </span>
                            </div>
                            <input class="list-search form-control" type="search" name="Search" placeholder="Search"/>
                        </div>
                    </form>
                </div>
            </div>
            <div class="search-nav d-flex ml-auto">
                <ul class="nav nav-tabs nav-tabs-sm border-0">
                    <li class="nav-item">
                        <a href="#upcoming-events" class="nav-link active" data-toggle="tab" role="tab">
                            Upcoming <span class="badge badge-pill badge-light">{{ totalUpcomingEvents }}</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#past-events" class="nav-link" data-toggle="tab" role="tab">
                            Past <span class="badge badge-pill badge-light">{{ totalPastEvents }}</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#cancelled-events" class="nav-link" data-toggle="tab" role="tab">
                            Cancelled <span class="badge badge-pill badge-light">{{ totalCancelledEvents }}</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="upcoming-events" role="tabpanel">
            <ng-container *ngIf="!!totalUpcomingEvents else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of upcomingEvents"
                    [data]="data"
                    (onClickAction)="handleJoinClick($event)"
                    [isLoading]="isLoading$ | async"
                ></app-service-card-dashboard>
            </ng-container>
        </div>

        <div class="tab-pane fade" id="past-events" role="tabpanel">
            <ng-container *ngIf="!!totalPastEvents else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of pastEvents"
                    [data]="data"
                    [isLoading]="isLoading$ | async"
                ></app-service-card-dashboard>
            </ng-container>
        </div>

        <div class="tab-pane fade" id="cancelled-events" role="tabpanel">
            <ng-container *ngIf="!!totalCancelledEvents else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of cancelledEvents"
                    [data]="data"
                    [isLoading]="isLoading$ | async"
                ></app-service-card-dashboard>
            </ng-container>
        </div>
    </div>
</ng-container>

<ng-template #noRecords>
    <div class="text-center font-size-sm text-muted w-100">No records to display</div>
</ng-template>

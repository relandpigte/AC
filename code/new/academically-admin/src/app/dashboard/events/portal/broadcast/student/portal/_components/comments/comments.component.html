<div class="comments-wrapper position-relative d-flex flex-column h-100p">
    <app-community-discussions
        [show]="true"
        [isSidebar]="true"
        [showAddComment]="true"
        [referenceId]="referenceId"
        [postType]="0"
        [postCreatorId]="3"
        (onUpdateEmit)="handleCommentUpdates()"
        (onDeleteComment)="doToggleComments()"
    ></app-community-discussions>
</div>

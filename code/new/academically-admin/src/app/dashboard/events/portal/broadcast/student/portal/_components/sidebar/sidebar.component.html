<div [class.content-hidden]="hidden" class="sidebar bg-white">
  <ul class="sidebar-menu d-flex flex-column gap-20">
    <li class="sidebar-logo">
      <a href="javascript:void(0)" (click)="$event.preventDefault();">
        <img src="assets/img/ac-logo-light.png" alt="Academically" />
      </a>
    </li>
    <ng-container *ngFor="let item of menuItems">
      <ng-container *ngIf="item.name !== 'Separator' else separatorTemplate">
        <li *ngIf="isMenuItemEnabled$(item) | async" class="position-relative" [class.active]="activeMenuItem === item">
          <a #menuItem [id]="item.name" href="javascript:void(0);" (click)="onMenuItemClick(item, $event)">
            <span class="icon" [class]="item.className"></span>
          </a>
          <div *ngIf="item.hasBadge && getMenuBadgeValue(item) && activeMenuItem !== item" class="sidebar-menu-item-badge d-flex justify-content-center align-items-center">
            {{ getMenuBadgeValue(item) }}
          </div>
        </li>
      </ng-container>
    </ng-container>
  </ul>

  <div *ngIf="!hidden" class="sidebar-contents" [ngSwitch]="activeMenuItem.name">
    <div class="sidebar-title">
      <h4 class="text-muted">
        {{ activeMenuItem.name | localize }}
      </h4>
    </div>

    <div class="sidebar-content">
      <app-overview *ngSwitchCase="'Overview'"></app-overview>
      <app-attendees *ngSwitchCase="'Attendees'"></app-attendees>
      <app-settings *ngSwitchCase="'Settings'"></app-settings>
      <app-offers *ngSwitchCase="'Offers'" [referenceId]="eventId"></app-offers>
      <app-comments *ngSwitchCase="'Comments'"></app-comments>
      <app-sidebar-questions *ngSwitchCase="'Questions'"></app-sidebar-questions>
      <app-polls *ngSwitchCase="'Activities'" [referenceId]="eventId"></app-polls>
      <app-sidebar-chat *ngSwitchCase="'Chat'" [referenceId]="eventId"></app-sidebar-chat>
      <app-handouts *ngSwitchCase="'Handouts'" [referenceId]="eventId" [isHost]="isHost"></app-handouts>
    </div>
  </div>
</div>

<ng-template #separatorTemplate>
  <li class="separator">
    <hr>
  </li>
</ng-template>

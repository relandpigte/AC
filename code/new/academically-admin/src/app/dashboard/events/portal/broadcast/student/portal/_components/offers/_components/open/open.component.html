<div class="flex-column">
  <div class="flex-grow-1 scroll-y h-0 p-3">
    <app-info-banner></app-info-banner>
    <table class="table table-sm mb-0">
      <tbody>
        <tr>
          <td class="p-0 border-0 d-flex flex-column justify-content-start align-items-center" [style.margin.px]="20" [style.gap.px]="20">
            <ng-container *ngIf="offers?.length > 0; else noOffers" >
              <app-offer-card *ngFor="let offer of offers" [offer]="offer"></app-offer-card>
            </ng-container>
            <ng-template #noOffers>
              <div class="col no-offers text-center">{{ 'No offers' | localize }} </div>
            </ng-template>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="actions p-3">
    <button class="btn btn-outline-secondary btn-block">{{ 'EditOffer' | localize }}</button>
    <ng-container [ngSwitch]="launched">
      <button *ngSwitchCase="false" class="btn btn-primary btn-block" (click)="launched=true">{{ 'LaunchOffer' | localize }}</button>
      <ng-container *ngSwitchCase="true">
        <button [popover]="endOfferPopTemplate" class="btn btn-danger btn-block" #endOfferPopElement="bs-popover">{{ 'EndOffer' | localize }}</button>
        <ng-template #endOfferPopTemplate>
          <h5 class="text-body">
            {{ 'UnshareVideoWarningMessage' | localize }}
          </h5>
          <hr>
          <div class="row">
            <div class="col-6 text-center">
              <button class="btn btn-sm btn-danger" (click)="launched=false">
                {{ 'StopVideo' | localize }}
              </button>
            </div>
            <div class="col-6 text-center">
              <button class="btn btn-sm btn-success" (click)="endOfferPopElement.hide()">
                {{ 'KeepPlaying' | localize }}
              </button>
            </div>
          </div>
        </ng-template>
      </ng-container>
    </ng-container>
  </div>
</div>

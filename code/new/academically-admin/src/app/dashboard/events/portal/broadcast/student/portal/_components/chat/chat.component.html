<div class="sidebar-chat d-flex flex-column h-100p">
    <ul class="chat-nav nav nav-tabs">
        <li class="nav-item">
            <a class="nav-link active" id="open-tab" data-toggle="tab" href="#public-chat" role="tab"
               aria-controls="open-container" aria-selected="true">
                {{ 'Public' | localize }}
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" id="answered-tab" data-toggle="tab" href="#private-chat" role="tab"
               aria-controls="answered-container" aria-selected="true">
                {{ 'Private' | localize }}
            </a>
        </li>
    </ul>

    <div class="chat-tab tab-content flex-grow-1">
        <div class="tab-pane fade show active" id="public-chat" role="tabpanel">
            <div class="chat-container d-flex flex-column h-100p">
                <div class="chat-conversation flex-grow-1" style="height: 0;">
                    <ng-container *ngIf="false else noMessages">
                        <app-chat-conversation
                            [isSidebar]="true"
                            [hasActions]="false"
                        ></app-chat-conversation>
                    </ng-container>
                </div>
                <div class="chat-composer mt-auto">
                    <app-chat-composer></app-chat-composer>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="private-chat" role="tabpanel">
            <div class="chat-container d-flex flex-column h-100p">
                <div class="chat-conversation flex-grow-1" style="height: 0;">
                    <ng-container *ngIf="false else noMessages">
                        <app-chat-conversation
                            [isSidebar]="true"
                            [hasActions]="false"
                        ></app-chat-conversation>
                    </ng-container>
                </div>
                <div class="chat-composer mt-auto hidden">
                    <app-chat-composer></app-chat-composer>
                </div>
                <div class="chat-user-list" [ngClass]="{ 'closed': !toggleAttendee }">
                    <div [ngClass]="{ 'closed': !toggleAttendee }"
                         class="dropup-trigger d-flex align-items-center justify-content-between"
                         (click)="toggleAttendee = !toggleAttendee">
                        <span>Attendees</span>
                        <span><img src="assets/img/events/chat/down.svg" alt="Attendees"/></span>
                    </div>
                    <div class="dropup-content" [ngClass]="{ 'closed': !toggleAttendee }">
                        <div class="dropup-content-search d-flex align-items-center">
                            <form>
                                <div class="input-group input-group-flush">
                                    <div class="input-group-prepend">
                                        <span class="input-group-text">
                                            <i class="fe fe-search"></i>
                                        </span>
                                    </div>
                                    <input [(ngModel)]="searchUser" class="list-search form-control" type="search" name="Search" placeholder="Search"/>
                                </div>
                            </form>
                        </div>
                        <div class="dropup-content-user">
                            <div *ngFor="let user of joinedUsers | search: searchUser"
                                 class="user-list d-flex align-items-center cursor-pointer gap-10">
                                <a class="avatar avatar-sm" href="javascript: void(0)">
                                    <img [src]="getProfilePictureUrl(user.profilePictureDocument)" [alt]="user.fullName"
                                         class="avatar-img rounded-circle">
                                </a>
                                <span>{{ user.fullName }}</span>
                            </div>
                            <div *ngIf="!!notJoinedUsers?.length" class="not-joined">{{ 'NotJoined' | localize }}</div>
                            <div *ngFor="let user of notJoinedUsers | search: searchUser"
                                 class="user-list d-flex align-items-center cursor-pointer gap-10">
                                <a class="avatar avatar-sm" href="javascript: void(0)">
                                    <img [src]="getProfilePictureUrl(user.profilePictureDocument)" [alt]="user.fullName"
                                         class="avatar-img rounded-circle">
                                </a>
                                <span>{{ user.fullName }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #noMessages>
    <span class="no-messages text-muted">{{ 'NoMessages' | localize }}</span>
</ng-template>

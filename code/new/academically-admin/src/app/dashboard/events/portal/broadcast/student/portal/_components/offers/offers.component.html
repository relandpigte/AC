<div class="flex-column h-100p">
  <ul *ngIf="isHost" class="nav nav-tabs nav-tabs-sm px-3">
    <li class="nav-item">
      <a href="#" class="nav-link active" id="queue-tab" data-toggle="tab" href="#queue-container" role="tab"
        aria-controls="queue-container" aria-selected="true">
        {{ 'Queue' | localize }}
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link" id="open-tab" data-toggle="tab" href="#open-container" role="tab"
        aria-controls="open-container" aria-selected="true">
        {{ 'Open' | localize }}
      </a>
    </li>
    <li class="nav-item">
      <a href="#" class="nav-link" id="closed-tab" data-toggle="tab" href="#closed-container" role="tab"
        aria-controls="closed-container" aria-selected="true">
        {{ 'Closed' | localize }}
      </a>
    </li>
  </ul>
  <div *ngIf="isHost" class="tab-content flex-grow-1 flex-column overflow-hidden">
    <div class="tab-pane fade show active flex-grow-1" id="queue-container" role="tabpanel" aria-labelledby="queue-tab">
      <app-queue [referenceId]="referenceId"></app-queue>
    </div>
    <div class="tab-pane fade flex-grow-1" id="open-container" role="tabpanel" aria-labelledby="open-tab">
      <app-open [referenceId]="referenceId"></app-open>
    </div>
    <div class="tab-pane fade flex-grow-1" id="closed-container" role="tabpanel" aria-labelledby="closed-tab">
      <app-closed></app-closed>
    </div>
  </div>

  <app-live *ngIf="!isHost" [isHost]="isHost" [controlsEnabled]="isHost"></app-live>
</div>

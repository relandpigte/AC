<div [@routerTransition] class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-12">
      <div class="header position-relative">
        <app-shimmer [show]="isLoading$ | async" [shimmerType]="isLearnerView ? shimmerType.DashboardHeaderLearner : shimmerType.DashboardHeaderCreator" backgroundColor="#f9fbfd"></app-shimmer>
        <div class="header-body">
          <div class="row align-items-center">
            <div class="col">
              <h6 class="header-pretitle">{{ 'Dashboard' | localize }}</h6>
              <h1 class="header-title">{{ 'Events' | localize }}</h1>
            </div>
            <div class="col-auto d-flex gap-10">
              <ng-container *ngIf="isTutor">
                <ng-container *ngIf="DashboardServiceView.creator === userView">
                  <div class="dropdown" *ngIf="userView === DashboardServiceView.creator">
                    <a href="#" class="btn btn-primary d-flex gap-5" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                      <span class="fe fe-plus"></span>
                      {{ 'Service.NewServiceText' | localize : 'event' }}
                    </a>
                    <div class="dropdown-menu dropdown-menu-right">
                      <div class="dropdown-item cursor-pointer" (click)="onCreateEvent(EventCategory.Broadcast)">{{ 'Broadcast' | localize }}</div>
                      <div class="dropdown-item cursor-pointer" (click)="onCreateEvent(EventCategory.Workshop)">{{ 'Workshop' | localize }}</div>
                    </div>
                  </div>
                </ng-container>
                <button class="btn btn-white custom-card-border d-flex align-items-center gap-10" (click)="handleSwitchView()">
                  <span class="fe fe-refresh-cw"></span>
                  Switch to {{ switchButtonText }} view
                </button>
              </ng-container>
            </div>
          </div>
          <app-sub-header [userView]="userView"></app-sub-header>
        </div>
      </div>

      <div class="tab-content" [ngSwitch]="userView">
        <ng-container *ngSwitchCase="DashboardServiceView.creator">
          <div class="tab-pane fade show active" id="created" role="tabpanel" aria-labelledby="created-tab">
            <app-created></app-created>
          </div>
          <div class="tab-pane fade" id="analytics" role="tabpanel" aria-labelledby="analytics-tab">
            <app-service-metrics [serviceType]="ServicesType.Event"></app-service-metrics>
          </div>
        </ng-container>
        <ng-container *ngSwitchDefault>
          <div class="tab-pane fade show active" id="purchased" role="tabpanel" aria-labelledby="purchased-tab">
            <app-purchased></app-purchased>
          </div>
          <div class="tab-pane fade" id="saved" role="tabpanel" aria-labelledby="save-tab">
            <app-saved></app-saved>
          </div>
          <div class="tab-pane fade" id="for-you" role="tabpanel" aria-labelledby="for-you-tab">
            <app-events-for-you></app-events-for-you>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>

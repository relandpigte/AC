<div class="row m-0">
  <div *ngFor="let coaching of coachings" class="col-12 col-md-6 col-xl-4 p-0">
    <div class="card mx-0 m-md-1">
      <a href="#!visit" (click)="$event.preventDefault();">
        <img [src]="getServiceImageUrl(coaching.thumbnailDocument)" alt="..." class="card-img-top">
      </a>
      <div class="card-body">
        <div class="row align-items-center">
          <div class="col">
            <h4 class="mb-2 name">
              <a href="#!visit" [routerLink]="[coaching.id]" (click)="$event.preventDefault();">
                {{ coaching.name }}
              </a>
            </h4>
            <p class="card-text small text-muted">
              {{ 'Created' | localize }} {{ convertMomentToDateAgo(coaching.creationTime) }}
            </p>
          </div>
          <div class="col-auto">
            <div class="dropdown">
              <a href="#" class="dropdown-ellipses dropdown-toggle" role="button" data-toggle="dropdown"
                aria-haspopup="true" aria-expanded="false">
                <i class="fe fe-more-vertical"></i>
              </a>
              <div class="dropdown-menu dropdown-menu-right">
                <a href="#!visit" *ngIf="coaching.type === CoachingType.Single" class="dropdown-item"
                  (click)="$event.preventDefault(); navToUrl('app/dashboard/coaching' , coaching.id)">
                  {{ 'Edit' | localize }}
                </a>
                <a href="#!visit" *ngIf="coaching.type === CoachingType.Series" class="dropdown-item"
                  (click)="$event.preventDefault(); navToUrl('app/dashboard/coaching/series' , coaching.id)">
                  {{ 'Edit' | localize }}
                </a>
                <a href="#!visit" class="dropdown-item" (click)="onDeleteClick(coaching.id)" (click)="$event.preventDefault(); ">
                  {{ 'Delete' | localize }}
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

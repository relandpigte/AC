<app-shimmer
    [isBlock]="true"
    [show]="isLoading$ | async"
    [shimmerType]="shimmerType.DashboardPurchased"
    backgroundColor="#f9fbfd"
></app-shimmer>

<ng-container *ngIf="!(isLoading$ | async)">

    <div class="card custom-card-border search">
        <div class="card-header border-0">
            <div class="row align-items-center">
                <div class="col">
                    <form>
                        <div class="input-group input-group-flush">
                            <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fe fe-search"></i>
                            </span>
                            </div>
                            <input class="list-search form-control" type="search" name="Search" placeholder="Search" />
                        </div>
                    </form>
                </div>
                <div class="search-nav d-flex ml-auto">
                    <ul class="nav nav-tabs nav-tabs-sm border-0">
                        <li class="nav-item">
                            <a href="#upcoming-coaching" class="nav-link active" data-toggle="tab" role="tab">
                                Upcoming <span class="badge badge-pill badge-light">{{ totalUpcomingCoaching }}</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#past-coaching" class="nav-link" data-toggle="tab" role="tab">
                                Past <span class="badge badge-pill badge-light">{{ totalPastCoaching }}</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#cancelled-coaching" class="nav-link" data-toggle="tab" role="tab">
                                Cancelled <span class="badge badge-pill badge-light">{{ totalCancelledCoaching }}</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="upcoming-coaching" role="tabpanel">
            <ng-container *ngIf="!!totalUpcomingCoaching else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of upcomingCoachings"
                    [data]="data"
                    [additionalData]="additionalData"
                    [isLoading]="isLoading$ | async"
                ></app-service-card-dashboard>
            </ng-container>
        </div>

        <div class="tab-pane fade" id="past-coaching" role="tabpanel">
            <ng-container *ngIf="!!totalPastCoaching else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of pastCoachings"
                    [data]="data"
                    [additionalData]="additionalData"
                    [isPast]="true"
                    [isLoading]="isLoading$ | async"
                ></app-service-card-dashboard>
            </ng-container>
        </div>

        <div class="tab-pane fade" id="cancelled-coaching" role="tabpanel">
            <ng-container *ngIf="!!totalCancelledCoaching else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of cancelledCoachings"
                    [data]="data"
                    [isCancelled]="true"
                    [additionalData]="additionalData"
                    [isLoading]="isLoading$ | async"
                ></app-service-card-dashboard>
            </ng-container>
        </div>
    </div>
</ng-container>


<ng-template #noRecords>
    <div class="text-center font-size-sm text-muted w-100">No records to display</div>
</ng-template>

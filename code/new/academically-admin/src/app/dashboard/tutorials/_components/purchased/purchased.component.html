
<app-shimmer
    [isBlock]="true"
    [show]="isLoading$ | async"
    [shimmerType]="shimmerType.DashboardPurchased"
    backgroundColor="#f9fbfd"
></app-shimmer>

<ng-container *ngIf="!(isLoading$ | async)">
    <div class="card custom-card-border search">
        <div class="card-header border-0">
            <div class="d-flex align-items-center">
                <form>
                    <div class="input-group input-group-flush">
                        <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fe fe-search"></i>
                            </span>
                        </div>
                        <input class="list-search form-control" type="search" name="Search" placeholder="Search" />
                    </div>
                </form>
                <div class="search-nav d-flex ml-auto">
                    <ul class="nav nav-tabs nav-tabs-sm border-0">
                        <li class="nav-item">
                            <a href="#all-videos" class="nav-link" [class.active]="selectedTab === purchasedTabs.All" (click)="selectedTab = purchasedTabs.All" data-toggle="tab" role="tab">
                                All <span class="badge badge-pill badge-light">{{ totalVideos }}</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#unwatched-videos" class="nav-link" [class.active]="selectedTab === purchasedTabs.Unwatched" (click)="selectedTab = purchasedTabs.Unwatched" data-toggle="tab" role="tab">
                                Unwatched <span class="badge badge-pill badge-light">{{ totalUnwatchedVideos }}</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="#watched-videos" class="nav-link" [class.active]="selectedTab === purchasedTabs.Watched" (click)="selectedTab = purchasedTabs.Watched" data-toggle="tab" role="tab">
                                Watched <span class="badge badge-pill badge-light">{{ totalWatchedVideos }}</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-content">
        <div class="tab-pane fade" [ngClass]="{ 'show active': selectedTab === purchasedTabs.All }" id="all-videos" role="tabpanel">
            <ng-container *ngIf="!!totalTutorials else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of tutorials"
                    [data]="data"
                    [isLoading]="isLoading$ | async"
                    (onCancelSession)="onCancelSessionClick($event)"
                    (onRepurchase)="onRepurchaseClick($event)"
                    (onRedirection)="onRedirection($event)"
                    (onReviewAction)="onReviewAction($event)"
                ></app-service-card-dashboard>
            </ng-container>
        </div>

        <div class="tab-pane fade" [ngClass]="{ 'show active': selectedTab === purchasedTabs.Unwatched }" id="unwatched-videos" role="tabpanel">
            <ng-container *ngIf="!!totalUnwatchedTutorials else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of unwatchedTutorials"
                    [data]="data"
                    [isLoading]="isLoading$ | async"
                    (onCancelSession)="onCancelSessionClick($event)"
                    (onRepurchase)="onRepurchaseClick($event)"
                    (onRedirection)="onRedirection($event)"
                    (onReviewAction)="onReviewAction($event)"
                ></app-service-card-dashboard>
            </ng-container>
        </div>

        <div class="tab-pane fade" [ngClass]="{ 'show active': selectedTab === purchasedTabs.Watched }" id="watched-videos" role="tabpanel">
            <ng-container *ngIf="!!totalWatchedTutorials else noRecords">
                <app-service-card-dashboard
                    *ngFor="let data of watchedTutorials"
                    [data]="data"
                    [isLoading]="isLoading$ | async"
                    (onCancelSession)="onCancelSessionClick($event)"
                    (onRepurchase)="onRepurchaseClick($event)"
                    (onRedirection)="onRedirection($event)"
                    (onReviewAction)="onReviewAction($event)"
                ></app-service-card-dashboard>
            </ng-container>
        </div>
    </div>
</ng-container>

<ng-template #noRecords>
    <div class="text-center font-size-sm text-muted w-100">No records to display</div>
</ng-template>

<div class="card" [loader]="isLoading">
  <div class="card-header">
    <h4 class="card-header-title">{{ 'UpcomingSessions' | localize}}</h4>
  </div>
  <div class="card-body pt-0 pb-0">
    <div class="list-group list-group-flush list-group-focus">
      <div *ngFor="let model of models" class="list-group-item">
        <div class="row align-items-center">
          <div class="col">

            <a [routerLink]="['/app/calendar']" [queryParams]="{ 'goto': getDateIsoString(model.startTime) }">
              <h4 class="text-focus mb-1 name">
                {{ model.title }}
              </h4>
            </a>

            <p class="small text-muted mb-0">
              <span class="fe fe-calendar"></span>
              <time class="ml-1">{{ model.project.name }}</time>
            </p>

            <p class="small text-muted mb-0">
              <span class="fe fe-clock"></span>
              <time class="ml-1">
                {{ convertMomentToDate(model.startTime) | date: 'dd/MM/yyyy hh:mm a' }}
              </time>
            </p>

          </div>

          <div class="col-auto">
            <button (click)="onJoinSessionClick(model)" class="btn btn-sm btn-primary">
              {{ 'Join' | localize }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

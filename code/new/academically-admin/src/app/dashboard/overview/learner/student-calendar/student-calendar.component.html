<div class="card">
    <app-shimmer
        [isBlock]="true"
        [show]="isLoading$ | async"
        [shimmerType]="shimmerType.DashboardOverviewCalendar"
    ></app-shimmer>

    <ng-container *ngIf="!(isLoading$ | async)">
        <div class="card-body">
            <full-calendar #calendar [options]="calendarOptions"></full-calendar>

            <div class="card-content">
                <h4 class="card-body-header">
                    {{ dateNow }}
                </h4>
                <div class="list-group list-group-flush my-n3">
                    <!-- Coaching list template -->
                    <!--div class="list-group-item">
                        <div class="d-flex align-items-center gap-15">
                            <div class="list-group-item-avatar">
                                <a href="#" class="avatar">
                                    <img src="assets/img/avatar-placeholder.png" alt="..." class="avatar-img rounded-circle">
                                </a>
                            </div>
                            <div class="list-group-item-text">
                                <span class="pre-title live">STARTING IN 3 MINUTES</span>
                                <h4 class="title mb-1 font-weight-normal">
                                    <a href="#">Lorem ipsum dolor sit am...</a>
                                </h4>
                                <p class="small mb-0 text-muted composition">
                                    Coaching with <span class="organizer">Jingying Chai</span>
                                </p>
                            </div>
                            <div>
                                <a href="#!" class="btn btn-sm btn-outline-primary">Join</a>
                            </div>
                        </div>
                    </div-->

                    <ng-container *ngIf="!!selectedEvents?.length else noEvents">
                        <div class="list-group-item" *ngFor="let event of selectedEvents">
                            <div class="d-flex align-items-center gap-15">
                                <div class="list-group-item-avatar">
                                    <a href="#" class="avatar">
                                        <img src="assets/img/img-placeholder.png" alt="..." class="avatar-img rounded">
                                    </a>
                                </div>
                                <div class="list-group-item-text">
                                    <span class="pre-title text-uppercase">{{ getEventSchedule(event) }}</span>
                                    <h4 class="title mb-1 font-weight-normal">
                                        <a href="#">{{ event.name | shorten : 22 }}</a>
                                    </h4>
                                    <p class="small mb-0 text-muted composition">
                                        <span class="organizer">You</span> and <span class="people">32 others</span> are going
                                    </p>
                                </div>
                                <div>
                                    <a href="#!" class="btn btn-sm btn-outline-primary">Join</a>
                                </div>
                            </div>
                        </div>
                    </ng-container>

                </div>
            </div>
        </div>
        <div class="card-footer">
            <a class="text-primary d-block text-center w-100" [routerLink]="['/app/calendar']">Go to schedule</a>
        </div>
    </ng-container>
</div>

<ng-template #noEvents>
    <div class="list-group-item">
        <span class="text-muted">No events</span>
    </div>
</ng-template>

<div class="row list">
    <div *ngFor="let course of courses" class="col-12">
      <div class="card">
        <div class="card-body">
          <div class="row align-items-center">
            <div class="col-auto">
              <a href="#!visit" class="avatar avatar-lg avatar-4by3"
                (click)="$event.preventDefault(); onVisitCourseClick(course)">
                <img [src]="getCourseImageUrl(course.courseImageUrl)" alt="..." class="avatar-img rounded">
              </a>
            </div>
            <div class="col ml-n2">
              <h4 class="mb-1 name">
                <a href="#!visit" (click)="$event.preventDefault(); onVisitCourseClick(course)">
                  {{ course.name }}
                </a>
              </h4>
              <p class="card-text small text-muted mb-0">
                <time datetime="2018-06-21">
                  {{ 'Created' | localize }} {{ convertMomentToDateAgo(course.creationTime) }}
                </time>
              </p>
            </div>
            <div class="col-auto">
              <!-- <div class="dropdown">
                <a href="#" class="dropdown-ellipses dropdown-toggle" role="button" data-toggle="dropdown"
                  aria-haspopup="true" aria-expanded="false">
                  <i class="fe fe-more-vertical"></i>
                </a>
                <div class="dropdown-menu dropdown-menu-right">
                  <a href="#!visit" class="dropdown-item" (click)="$event.preventDefault(); onVisitCourseClick(course)">
                    {{ 'Visit' | localize }}
                  </a>
                </div>
              </div> -->
              <button [routerLink]="['/app/tutor-portal', course.id]" type="button"
              class="btn btn-outline-success btn-sm btn-rounded-circle mr-1">
              <span class="fe fe-trending-up"></span>
            </button>
            <button [routerLink]="['/app/courses', course.id]" type="button"
              class="btn btn-outline-primary btn-sm btn-rounded-circle mr-1">
              <span class="fe fe-edit-2"></span>
            </button>
            <button (click)="onDeleteClick(course.id)" type="button"
              class="btn btn-outline-danger btn-sm btn-rounded-circle">
              <span class="fe fe-trash-2"></span>
            </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

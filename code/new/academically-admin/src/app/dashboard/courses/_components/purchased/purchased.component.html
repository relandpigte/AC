<ng-container *ngIf="allCourses">

    <app-shimmer
        [isBlock]="true"
        [show]="isLoading$ | async"
        [shimmerType]="shimmerType.DashboardPurchased"
        backgroundColor="#f9fbfd"
    ></app-shimmer>

    <ng-container *ngIf="!(isLoading$ | async)">

        <div class="card custom-card-border search">
            <div class="card-header border-0">
                <div class="d-flex align-items-center">
                    <form>
                        <div class="input-group input-group-flush">
                            <div class="input-group-prepend">
                            <span class="input-group-text">
                                <i class="fe fe-search"></i>
                            </span>
                            </div>
                            <input class="list-search form-control" type="search" name="Search" placeholder="Search" />
                        </div>
                    </form>
                    <div class="search-nav d-flex ml-auto">
                        <ul class="nav nav-tabs nav-tabs-sm border-0">
                            <li class="nav-item">
                                <a href="#all-courses" class="nav-link active" data-toggle="tab" role="tab">
                                    All <span class="badge badge-pill badge-light">{{ totalCourses }}</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a href="#todo-courses" class="nav-link" data-toggle="tab" role="tab">
                                    To do <span class="badge badge-pill badge-light">{{ totalTodoCourses }}</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a href="#completed-courses" class="nav-link" data-toggle="tab" role="tab">
                                    Completed <span class="badge badge-pill badge-light">{{ totalCompletedCourses }}</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="all-courses" role="tabpanel">
                <ng-container *ngIf="allCourses?.length else noRecords">
                    <app-service-card-dashboard
                        *ngFor="let data of allCourses"
                        [data]="data"
                        [isLoading]="isLoading$ | async"
                        (onClickAction)="handleRedirectToCourse($event)"
                    ></app-service-card-dashboard>
                </ng-container>
            </div>

            <div class="tab-pane fade" id="todo-courses" role="tabpanel">
                <ng-container *ngIf="todoCourses?.length else noRecords">
                    <app-service-card-dashboard
                        *ngFor="let data of todoCourses"
                        [data]="data"
                        [isLoading]="isLoading$ | async"
                        (onClickAction)="handleRedirectToCourse($event)"
                    ></app-service-card-dashboard>
                </ng-container>
            </div>

            <div class="tab-pane fade" id="completed-courses" role="tabpanel">
                <ng-container *ngIf="completedCourses?.length else noRecords">
                    <app-service-card-dashboard
                        *ngFor="let data of completedCourses"
                        [data]="data"
                        [isLoading]="isLoading$ | async"
                        (onClickAction)="handleRedirectToCourse($event)"
                    ></app-service-card-dashboard>
                </ng-container>
            </div>
        </div>
    </ng-container>
</ng-container>

<ng-template #noRecords>
    <div class="text-center font-size-sm text-muted w-100">No records to display</div>
</ng-template>

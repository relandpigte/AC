<app-course-template *ngIf="currentWizardState === CourseWizardState.Template" (modalClose)="onModalClose()"
  (selectTemplate)="onStateChange(CourseWizardState.Name)">
</app-course-template>
<app-course-name *ngIf="currentWizardState === CourseWizardState.Name" (modalClose)="onModalClose()"
  (backClick)="onStateChange(CourseWizardState.Template)" (courseSaved)="onCourseSaved()">
</app-course-name>

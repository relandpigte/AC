<div class="container-fluid" [@routerTransition]>
  <div class="row justify-content-center">
    <div class="col-12">
      <div class="header">
        <div class="header-body">
          <div class="row align-items-center">
            <div class="col">
              <h6 class="header-pretitle">{{ 'Dashboard' | localize }}</h6>
              <h1 class="header-title">{{ 'Workshop' | localize }}</h1>
            </div>
            <div class="col-auto">
              <a href="#!new-workshop" class="btn btn-primary ml-2" (click)="$event.preventDefault(); onNewWorkshopClick()"
                *ngIf="isTutor">
                {{ 'NewWorkshop' | localize | titlecase }}
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

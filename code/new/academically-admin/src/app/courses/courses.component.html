<app-service-create
  [menuItems]="menuItems"
  [servicesType]="ServicesType.Course"
  [model]="course"
  [returnUrl]="'/app/dashboard/courses/'"
  (onPublished)="onPublishClick()"
  (onUnpublished)="onUnpublishClick()"
>
  <app-curriculum *ngIf="defaultMenuItem.id === 'curriculum'" [courseId]="id"></app-curriculum>
  <app-details *ngIf="defaultMenuItem.id === 'details'"></app-details>
  <app-settings *ngIf="defaultMenuItem.id === 'settings'"></app-settings>
</app-service-create>

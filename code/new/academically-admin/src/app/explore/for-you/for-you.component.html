<div [@routerTransition]>
  <div class="header">
    <div class="container-fluid p-0">
      <div class="header-body p-0 pb-5">

        <ng-container *ngIf="newUsers?.length > 0">
          <div class="row align-items-center" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">New Users</span>
              <span class="view-all cursor-pointer" [routerLink]="['users']">View All <i class="fas fa-arrow-right"></i></span>
            </div>
          </div>
          <app-carousel [items]="newUsers" [isLoading]="isLoadingNewUsers"></app-carousel>
        </ng-container>

        <ng-container *ngIf="upcomingEvents?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">Upcoming Events</span>
              <span class="view-all cursor-pointer" [routerLink]="['events']">View All <i class="fas fa-arrow-right"></i></span>
            </div>
          </div>
          <app-carousel [items]="upcomingEvents" [isLoading]="isLoadingUpcomingEvents"></app-carousel>
        </ng-container>

        <ng-container *ngIf="recommendedCourses?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">Recommended Courses</span>
              <span class="view-all cursor-pointer" [routerLink]="['courses']">View All <i class="fas fa-arrow-right"></i></span>
            </div>
          </div>
          <app-carousel [items]="recommendedCourses" [isLoading]="isLoadingRecommendedCourses"></app-carousel>
        </ng-container>

        <ng-container *ngIf="newArticles?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">New Articles</span>
              <span class="view-all cursor-pointer" [routerLink]="['articles']">View All <i class="fas fa-arrow-right"></i></span>
            </div>
          </div>
          <app-carousel [items]="newArticles" [isLoading]="isLoadingNewArticles"></app-carousel>
        </ng-container>

        <ng-container *ngIf="upcomingEvents?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">Recommended Tutorials</span>
              <span class="view-all cursor-pointer" [routerLink]="['tutorials']">View All <i class="fas fa-arrow-right"></i></span>
            </div>
          </div>
          <app-carousel [items]="recommendedTutorials" [isLoading]="isLoadingRecommendedTutorials"></app-carousel>
        </ng-container>

        <ng-container *ngIf="newCoachings?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">New Coachings</span>
              <span class="view-all cursor-pointer" [routerLink]="['coachings']">View All <i class="fas fa-arrow-right"></i></span>
            </div>
          </div>
          <app-carousel [items]="newCoachings" [isLoading]="isLoadingNewCoachings"></app-carousel>
        </ng-container>

      </div>
    </div>
  </div>
</div>

<div [@routerTransition]>
  <div class="header">
    <div class="container-fluid p-0">
      <div class="header-body p-0 pb-5">

        <ng-container *ngIf="newUsers?.length > 0">
          <div class="row align-items-center" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">New Users</span>
              <span class="view-all cursor-pointer" [routerLink]="['users']">View All</span>
            </div>
          </div>
          <app-carousel
            [items]="newUsers"
            [maxItems]="newUsersMaxItems"
            [itemWidth]="260"
            [itemSpacing]="25"
            [isAutoFit]="true"
            [isLoading]="isLoading_newUsers"
            [isInfiteScroll]="true"
            (onRequestNewData)="handleNewUsersRequestData($event)">
          </app-carousel>
        </ng-container>

        <ng-container *ngIf="upcomingBroadcasts?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">Upcoming Broadcasts</span>
              <span class="view-all cursor-pointer" [routerLink]="['events']">View All</span>
            </div>
          </div>
          <app-carousel
            [items]="upcomingBroadcasts"
            [maxItems]="upcomingBroadcastsMaxItems"
            [itemWidth]="352"
            [itemSpacing]="30"
            [isAutoFit]="true"
            [isInfiteScroll]="true"
            (onRequestNewData)="handleUpcomingBroadcastsRequestData($event)"
            (onServiceCardShareClick)="handleServiceCardShareClick($event)"
            (onServiceCardClick)="handleEventServiceCardClick($event)">
          </app-carousel>
        </ng-container>

        <ng-container *ngIf="upcomingWorkshops?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">Upcoming Workshops</span>
              <span class="view-all cursor-pointer" [routerLink]="['events']">View All</span>
            </div>
          </div>
          <app-carousel
            [items]="upcomingWorkshops"
            [maxItems]="upcomingWorkshopsMaxItems"
            [itemWidth]="352"
            [itemSpacing]="30"
            [isAutoFit]="true"
            [isInfiteScroll]="true"
            (onRequestNewData)="handleUpcomingWorkshopsRequestData($event)"
            (onServiceCardShareClick)="handleServiceCardShareClick($event)"
            (onServiceCardClick)="handleEventServiceCardClick($event)">
          </app-carousel>
        </ng-container>

        <ng-container *ngIf="recommendedCourses?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">Recommended Courses</span>
              <span class="view-all cursor-pointer" [routerLink]="['courses']">View All</span>
            </div>
          </div>
          <app-carousel
            [items]="recommendedCourses"
            [maxItems]="recommendedCoursesMaxItems"
            [itemWidth]="352"
            [itemSpacing]="30"
            [isAutoFit]="true"
            [isLoading]="isLoading_recommendedCourses"
            [isInfiteScroll]="true"
            (onRequestNewData)="handleRecommendedCoursesRequestData($event)"
            (onServiceCardShareClick)="handleServiceCardShareClick($event)"
            (onServiceCardClick)="handleCourseServiceCardClick($event)">
          </app-carousel>
        </ng-container>

        <ng-container *ngIf="newArticles?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">New Articles</span>
              <span class="view-all cursor-pointer" [routerLink]="['articles']">View All</span>
            </div>
          </div>
          <app-carousel
            [items]="newArticles"
            [maxItems]="newArticlesMaxItems"
            [itemWidth]="543"
            [itemSpacing]="30"
            [isAutoFit]="true"
            [isLoading]="isLoading_newArticles"
            [isInfiteScroll]="true"
            (onRequestNewData)="handleNewArticlesRequestData($event)"
            (onServiceCardShareClick)="handleServiceCardShareClick($event)"
            (onServiceCardClick)="handleArticleServiceCardClick($event)">
          </app-carousel>
        </ng-container>

        <ng-container *ngIf="recommendedTutorials?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">Recommended Tutorials</span>
              <span class="view-all cursor-pointer" [routerLink]="['tutorials']">View All</span>
            </div>
          </div>
          <app-carousel
            [items]="recommendedTutorials"
            [maxItems]="recommendedTutorialsMaxItems"
            [itemWidth]="352"
            [itemSpacing]="30"
            [isAutoFit]="true"
            [isLoading]="isLoading_recommendedTutorials"
            [isInfiteScroll]="true"
            (onRequestNewData)="handleRecommendedTutorialsRequestData($event)"
            (onServiceCardShareClick)="handleServiceCardShareClick($event)"
            (onServiceCardClick)="handleTutorialServiceCardClick($event)">
          </app-carousel>
        </ng-container>

        <ng-container *ngIf="newCoachings?.length > 0">
          <div class="row align-items-center" [style.marginTop.px]="45" [style.marginBottom.px]="25">
            <div class="col d-flex flex-wrap align-items-center justify-content-between">
              <span class="recommended-title">New Coachings</span>
              <span class="view-all cursor-pointer" [routerLink]="['coachings']">View All</span>
            </div>
          </div>
          <app-carousel
            [items]="newCoachings"
            [maxItems]="newCoachingsMaxItems"
            [itemWidth]="352"
            [itemSpacing]="30"
            [isAutoFit]="true"
            [isLoading]="isLoading_newCoachings"
            [isInfiteScroll]="true"
            (onRequestNewData)="handleNewCoachingsRequestData($event)"
            (onServiceCardShareClick)="handleServiceCardShareClick($event)"
            (onServiceCardClick)="handleNewCoachingServiceCardClick($event)">
          </app-carousel>
        </ng-container>

      </div>
    </div>
  </div>
</div>

<div [@routerTransition]>
  <div class="header">
    <div class="container-fluid p-0">
      <div class="header-body">

        <div [style.marginBottom.px]="40">
          <app-carousel [items]="featured" [isInfiteScroll]="false" [isLoading]="isLoading" [isFeatured]="true" [circular]="true"></app-carousel>
        </div>

        <ng-container *ngIf="isGroupByTopics">
          <ng-container *ngFor="let t of topics">
            <div class="row align-items-center" [style.marginBottom.px]="25">
              <div class="col d-flex flex-wrap gap-15">
                <span class="section-title">{{ t | titlecase }}</span>
              </div>
            </div>
            <div class="row align-items-center mb-5">
              <div class="col d-flex flex-wrap gap-27">
                <app-service-card *ngFor="let d of topicGroups[t]" [data]="d" [isLoading]="isLoading"></app-service-card>
                <div class="flex-break"></div>
                <div class="btn btn-block btn-white flex-grow-1">Show More</div>
              </div>
            </div>
          </ng-container>
        </ng-container>

        <ng-container *ngIf="!isGroupByTopics">
          <ng-container *ngIf="latest?.length">
            <div class="row align-items-center" [style.marginBottom.px]="25">
              <div class="col d-flex flex-wrap gap-15">
                <span class="section-title">Latest</span>
              </div>
            </div>
            <div class="row align-items-center mb-5">
              <div class="col d-flex flex-wrap gap-27">
                <app-service-card *ngFor="let d of latest" [data]="d" [isLoading]="isLoading"></app-service-card>
                <div class="flex-break"></div>
                <div class="btn btn-block btn-white flex-grow-1">Show More</div>
              </div>
            </div>
          </ng-container>

          <ng-container *ngIf="lastMonth?.length">
            <div class="row align-items-center" [style.marginBottom.px]="25">
              <div class="col d-flex flex-wrap gap-15">
                <span class="section-title">Last Month</span>
              </div>
            </div>
            <div class="row align-items-center">
              <div class="col d-flex flex-wrap gap-27">
                <app-service-card *ngFor="let d of lastMonth" [data]="d" [isLoading]="isLoading"></app-service-card>
                <div class="flex-break"></div>
                <div class="btn btn-block btn-white flex-grow-1">Show More</div>
              </div>
            </div>
          </ng-container>
        </ng-container>

      </div>
    </div>
  </div>
</div>

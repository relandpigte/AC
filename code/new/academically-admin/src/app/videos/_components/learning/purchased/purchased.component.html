<div class="row mb-4 mt-2">
  <div class="col-10">
  </div>
  <div class="col-2">
    <div class="nav btn-group" role="tablist">
      <button class="btn btn-lg btn-white active" data-toggle="tab" data-target="#purchase-grid-tab" role="tab"
        aria-controls="purchase-grid-tab" aria-selected="true">
        <span class="fe fe-grid"></span>
      </button>
      <button class="btn btn-lg btn-white" data-toggle="tab" data-target="#purchase-list-tab" role="tab" aria-controls="purchase-list-tab"
        aria-selected="false">
        <span class="fe fe-list"></span>
      </button>
    </div>
  </div>
</div>

<div *ngIf="models && models.length else noVideosTemplate" class="tab-content ml-2" [loader]="loading">
  <div class="tab-pane fade active show" id="purchase-grid-tab" role="tabpanel">
    <app-grid [models]="models" ></app-grid>
  </div>
  <div class="tab-pane fade" id="purchase-list-tab" role="tabpanel">
    <app-list [models]="models"></app-list>
  </div>
</div>


<ng-template #noVideosTemplate>
  <p class="m-0 p-5 text-muted text-center">
    {{ 'NoRecordsFound' | localize }}
  </p>
</ng-template>

<app-service-create
  [menuItems]="menuItems"
  [servicesType]="ServicesType.Tutorial"
  [model]="model"
  [returnUrl]="'/app/dashboard/tutorials/'"
  (onPublished)="onPublishClick()"
  (onUnpublished)="onUnpublishClick()"
>
  <app-video *ngIf="defaultMenuItem.id === 'playlist'"></app-video>
  <app-video-details *ngIf="defaultMenuItem.id === 'details'"></app-video-details>
  <app-video-settings *ngIf="defaultMenuItem.id === 'settings'"></app-video-settings>
</app-service-create>

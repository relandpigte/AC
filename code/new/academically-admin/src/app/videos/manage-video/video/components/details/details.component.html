<div class="video d-flex align-items-center justify-content-between" [class.border-top]="!isFirst">
  <div class="video-left-content d-flex align-items-center">
    <div class="video-left-content-drag cursor-drag drag-handle">
      <img class="drag-handle" src="assets/img/service/video/icon-drag.svg" alt="Move">
    </div>
    <div class="video-left-content-movie">
      <img src="assets/img/service/video/icon-video.svg" alt="Video">
    </div>
    <div class="video-left-content-details d-flex flex-column gap-4">
      <h6>{{ fileName | titlecase }}</h6>
      <div class="video-left-content-details-info">
        {{ formatBytes(fileSize) }} {{ fileType | uppercase }}
      </div>
    </div>
  </div>
  <div class="video-right-content d-flex align-items-center gap-14">
    <div class="video-right-content-view">
      <a href="javascript: void(0)">
        <img src="assets/img/service/video/icon-right.svg" alt="Move">
      </a>
    </div>
    <div class="video-right-content-actions">
      <div class="dropdown">
        <a href="javascript:void(0);" class="dropdown-ellipses dropdown-toggle" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
          <img src="assets/img/service/video/icon-ellipsis.svg" alt="Actions">
        </a>
        <div class="dropdown-menu dropdown-menu-right">
          <a href="javascript:void(0)" class="dropdown-item">Delete</a>
        </div>
      </div>
    </div>
  </div>
</div>

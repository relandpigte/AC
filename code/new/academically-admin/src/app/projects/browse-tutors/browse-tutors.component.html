<div class="container-fluid" [@routerTransition]>
  <div class="row">
    <div class="col-3"></div>
    <div class="col-9">
      <div class="card">
        <div class="card-header">
          <div class="row align-items-center">
            <div class="col">
              <form>
                <div class="input-group input-group-flush">
                  <div class="input-group-prepend">
                    <span class="input-group-text">
                      <i class="fe fe-search"></i>
                    </span>
                  </div>
                  <input class="list-search form-control" type="search" name="Search" placeholder="Search"
                    [(ngModel)]="searchFilter" (keyup.enter)="getDataPage(1)" />
                </div>
              </form>
            </div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-sm card-table" [loader]="isTableLoading">
            <tbody>
              <tr class="filter-row table-nowrap">
                <td>
                  <b>{{ totalItems }}</b> {{ 'TutorsFound' | localize }}
                </td>
                <td width="1%">
                  <div class="d-flex align-items-center">
                    <label class="m-0 pr-2" for="ukOnly">UK Only</label>
                    <div class="custom-control custom-switch">
                      <input type="checkbox" class="custom-control-input" id="ukOnly">
                      <label class="custom-control-label" for="ukOnly"></label>
                    </div>
                  </div>
                </td>
                <td width="1%">
                  <div class="d-flex align-items-center">
                    <label class="col-form-label pr-2" for="sort">Sort:</label>
                    <select select2 [defaultValue]="'Best match'" (select2ValueChange)="pageSizeChange($event)"
                      name="sort" class="custom-select custom-select-sm" data-toggle="select">
                      <option>{{ 'BestMatch' | localize }}</option>
                      <option>{{ 'Rating' | localize }}</option>
                      <option>{{ 'AcademicLevel' | localize }}</option>
                      <option>{{ 'Distance' | localize }}</option>
                    </select>
                  </div>
                </td>
                <td width="1%">
                  <select [(ngModel)]="pageNumber" select2 [defaultValue]="pageSize"
                    (select2ValueChange)="pageSizeChange($event)" name="PageNumber"
                    class="custom-select custom-select-sm" data-toggle="select">
                    <option *ngFor="let pageSizeSelection of pageSizeSelections" [value]="pageSizeSelection">
                      {{ pageSizeSelection }} {{ 'PerPage' | localize }}
                    </option>
                  </select>
                </td>
              </tr>
              <tr
                *ngFor="let availableTutor of (availableTutors | paginate: { id: 'available-tutors', itemsPerPage: pageSize, currentPage: pageNumber, totalItems: totalItems })">
                <td colspan="4">
                  <div class="row align-items-center">
                    <div class="col-12">
                      <div class="row align-items-center">
                        <div class="col-auto">
                          <a href="javascript:;" class="avatar avatar-md">
                            <img
                              [src]="getProfilePictureFromDocument(availableTutor.tutor.profilePictureDocument, availableTutor.tutor.id)"
                              alt="..." class="avatar-img rounded-circle">
                          </a>
                        </div>
                        <div class="col ml-n2">
                          <div class="d-flex align-items-center">
                            <h4 class="mb-0 mr-2">
                              <a href="javascript:;">{{ availableTutor.tutor.fullName }}</a>
                            </h4>
                            <app-star-rating [actualRating]="4"></app-star-rating>
                            <p class="small text-muted mb-0 ml-2">101</p>
                          </div>
                          <p class="small text-muted mb-0">
                            {{ availableTutor.tutor.currentUniversity ?availableTutor. tutor.currentUniversity :
                            ('NoFormalEducation' | localize) }}
                          </p>
                        </div>
                        <div class="col-auto">
                          <button class="btn btn-sm btn-primary">
                            {{ 'InvoteToQuote' | localize }}
                          </button>
                        </div>
                      </div>
                    </div>
                    <div class="col-12 p-3">
                      <div toggableContent identifier="about{{ availableTutor.tutor.id }}" contentClass="ql-container">
                        <quill-view-html [content]="availableTutor.tutor.about" theme="snow"></quill-view-html>
                      </div>
                      <div *ngIf="availableTutor.services && availableTutor.services.length" class="pt-3">
                        <ng-container *ngFor="let service of availableTutor.services">
                          <span *ngFor="let subject of service.subjects" class="badge badge-soft-info mr-1">
                            {{ subject }}
                          </span>
                          <span *ngFor="let disciplineTaxonomy of service.disciplineTaxonomies"
                            class="badge badge-soft-info mr-1">
                            {{ disciplineTaxonomy }}
                          </span>
                        </ng-container>
                      </div>
                    </div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
          <abp-pagination-controls id="available-tutors" (pageChange)="getDataPage($event)"></abp-pagination-controls>
        </div>
      </div>
    </div>
  </div>
</div>

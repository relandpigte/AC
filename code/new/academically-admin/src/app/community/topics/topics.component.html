<div [@routerTransition]>
  <div class="container-fluid">
    <div class="header-body pt-0" [style.marginBottom.px]="30">
        <div class="row align-items-end" [style.marginTop.px]="40">
            <div class="col mb-md-0">
                <div class="topics-superscript">{{ pageHeadingSuperscript | localize }}</div>
                <div class="topics-header">{{ 'Community.Topics' | localize }}</div>
            </div>
        </div>
        <div class="row align-items-center">
            <div class="col">
                <ul class="nav nav-tabs nav-overflow header-tabs">
                    <li class="nav-item">
                        <a [routerLink]="['all']" routerLinkActive="active" class="nav-link" role="button">{{ 'Community.Topics.AllTopics' | localize }}</a>
                    </li>
                    <li class="nav-item">
                        <a [routerLink]="['following']" routerLinkActive="active" class="nav-link" role="button">{{ 'Following' | localize }}</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
  </div>
  <div class="container-fluid community-content d-flex flex-row flex-nowrap p-0">
    <router-outlet></router-outlet>
  </div>
</div>

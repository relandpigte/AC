<div class="modal-card card">
    <div class="card-header">
        <div class="row align-items-center">
            <div class="col">
                <ul class="nav nav-tabs nav-overflow header-tabs">
                    <li class="nav-item">
                        <a class="nav-link" [class.active]="activeTab === 'more'" role="button" (click)="setActiveTab('more')">{{ 'Community.Topics.More' | localize }}</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" [class.active]="activeTab === 'following'" role="button" (click)="setActiveTab('following')">{{ 'Following' | localize }}</a>
                    </li>
                </ul>
            </div>
        </div>
        <button type="button" class="close" aria-label="Close" (click)="onCloseClick()">
          <span aria-hidden="true">×</span>
        </button>
    </div>

    <div class="card-body p-0">
        <app-more-topics *ngIf="activeTab === 'more'"></app-more-topics>
        <app-following-topics *ngIf="activeTab === 'following'"></app-following-topics>
    </div>

    <div class="card-footer d-flex justify-content-between p-0">
        <button type="button" class="btn btn-link btn-block" (click)="navigateToAllTopics()">
          {{ 'Community.Topics.BrowseAll' | localize }}
        </button>
    </div>
  </div>

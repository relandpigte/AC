<app-interests #interests

    [userId]="userId" [isViewOnly]="isViewOnly">
</app-interests>

<app-methodologies #methodologies
    *ngIf="permission.isGranted('Pages.Profile.Research.ResearchMethodologies') || permission.isGranted('Pages.TutorApplications.Research')"

</app-methodologies>

<app-publications #publications
    *ngIf="permission.isGranted('Pages.Profile.Research.ResearchPublications') || permission.isGranted('Pages.TutorApplications.Research')"
    [userId]="userId" [isViewOnly]="isViewOnly">
</app-publications>

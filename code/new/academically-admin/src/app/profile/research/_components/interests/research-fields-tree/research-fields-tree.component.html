<form class="form-horizontal" autocomplete="off" #taxonomySearchForm="ngForm" (ngSubmit)="onFormSubmit()"
  [loader]="isLoading">
  <div class="modal-card card">
    <div class="card-header">
      <h4 class="card-header-title">
        {{ 'ResearchMethods' | localize }}
      </h4>
      <button type="button" class="close" aria-label="Close" (click)="onCloseClick()">
        <span aria-hidden="true">×</span>
      </button>
    </div>
    <div class="card-body">
      <div class="ac-alerts">
        <div *ngFor="let selectedResearchMethod of selectedDisciplineTaxonomies"
          class="alert alert-info alert-dismissible ac-alert" role="alert">
          {{ selectedResearchMethod.label }}
          <button type="button" class="close" data-dismiss="alert" aria-label="Close"
            (click)="$event.preventDefault(); onRemoveClick(selectedResearchMethod.key)">
            <span aria-hidden="true">×</span>
          </button>
        </div>
      </div>
      <p-tree [value]="disciplineTaxonomies" [propagateSelectionUp]="false" [propagateSelectionDown]="false"
        [emptyMessage]="''" [(selection)]="selectedDisciplineTaxonomies" [filter]="true" selectionMode="checkbox">
      </p-tree>
    </div>
    <abp-modal-footer [saveDisabled]="!taxonomySearchForm.form.valid || isLoading" [saveLabel]="'Add' | localize"
      (onCancelClick)="onCloseClick()">
    </abp-modal-footer>
  </div>
</form>

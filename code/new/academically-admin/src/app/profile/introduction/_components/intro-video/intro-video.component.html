<div class="card"
  *ngIf="permission.isGranted('Pages.Profile.Introduction.Video') && appSession.userId == user.id; else studentViewTemplate">

  <div class="card-header">
    <div class="row align-items-center">
      <div class="col">
        <h4 class="card-header-title">{{ 'IntroductoryVideo' | localize }}</h4>
      </div>
      <div class="col-auto">
        <button *ngIf="!user.introVideoUrl" [disabled]="isLoading" (click)="onSaveClick()" class="btn btn-sm btn-light">
          <span *ngIf="!isLoading">
            <i class="fe fe-save"></i>
            {{ 'Save' }}
          </span>
          <span *ngIf="isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            {{ 'Saving' }}
          </span>
        </button>
        <button *ngIf="user.introVideoUrl" [disabled]="isLoading" (click)="onDeleteClick()"
          class="btn btn-sm btn-light">
          <span *ngIf="!isLoading">
            <i class="fe fe-trash"></i>
            {{ 'Delete' }}
          </span>
          <span *ngIf="isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
            {{ 'Deleting' }}
          </span>
        </button>
      </div>
    </div>
  </div>
  <div class="card-body">
    <app-document-uploader *ngIf="!user.introVideoUrl" #documentUploader (filesChanged)="onFilesChanged($event)"
      [allowedExtensions]="introVideoExtensions" [maxFiles]="1"
      [noFilePlaceholder]="'IntroductoryVideoUploadMessage' | localize">
    </app-document-uploader>
    <video *ngIf="user.introVideoUrl" width="100%" height="100%" controls autoplay>
      <source [src]="user.introVideoUrl">
    </video>
  </div>
</div>
<ng-template #studentViewTemplate>
  <div *ngIf="user.introVideoUrl" class="mb-4">
    <video width="100%" height="100%" controls autoplay>
      <source [src]="user.introVideoUrl">
    </video>
  </div>
</ng-template>

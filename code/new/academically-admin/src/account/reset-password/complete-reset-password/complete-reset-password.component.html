<div [@routerTransition]>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-5 col-xl-4 my-5">
          <h1 class="display-4 text-center mb-3">
            {{ 'PasswordReset' | localize }}
          </h1>

          <p class="text-muted text-center mb-5">
            {{ 'PasswordResetNew' | localize }}
          </p>

          <form novalidate autocomplete="off" #resetPasswordForm="ngForm" (ngSubmit)="onResetPasswordSubmit()">
            <div class="form-group">
              <label>{{ 'NewPassword' | localize }}</label>

              <input
                type="password"
                class="form-control"
                name="newPassword"
                id="newPassword"
                [(ngModel)]="passwordReset.newPassword"
                pattern="(?=.*?[A-Z])(?=.*?[a-z])(?=.*?[\d])(?=.*?[^\sa-zA-Z0-9]).{8,}"
                #newPasswordModel="ngModel"
                #newPasswordEl
                [placeholder]="'EnterNewPassword' | localize"
                required
              />
              <abp-validation-summary [control]="newPasswordModel" [controlEl]="newPasswordEl"></abp-validation-summary>
            </div>
            <div class="form-group">
              <label>{{ 'ConfirmNewPassword' | localize }}</label>

              <input
                type="password"
                class="form-control"
                name="confirmNewPassword"
                id="confirmNewPassword"
                [(ngModel)]="passwordReset.newPasswordConfirmation"
                #newPasswordConfirmationModel="ngModel"
                #newPasswordConfirmationEl
                validateEqual="newPassword"
                [placeholder]="'EnterConfirmNewPassword' | localize"
                required
              />
              <abp-validation-summary
                [control]="newPasswordConfirmationModel"
                [controlEl]="newPasswordConfirmationEl"
              ></abp-validation-summary>
            </div>

            <button type="submit" [disabled]="!resetPasswordForm.form.valid || saving" class="btn btn-lg btn-block btn-primary mb-3">
              {{ 'ResetPassword' | localize }}
            </button>

            <div class="text-center">
              <small class="text-muted text-center"> Remember your password? <a [routerLink]="['/account/login']">Log in</a>. </small>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

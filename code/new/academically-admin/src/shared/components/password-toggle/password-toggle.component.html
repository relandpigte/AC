<div class="input-group input-group-merge">
  <input [type]="!isPasswordVisible ? 'password' : 'text'" class="form-control form-control-appended"
    [(ngModel)]="password" (ngModelChange)="updateChanges()" [placeholder]="placeholder" />
  <div class="input-group-append" (click)="togglePasswordVisibility()">
    <span class="input-group-text">
      <i [class]="!isPasswordVisible ? 'pi pi-eye' : 'pi pi-eye-slash'"></i>
    </span>
  </div>
</div>

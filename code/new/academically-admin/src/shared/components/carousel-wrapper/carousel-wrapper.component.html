<p-carousel
  *ngIf="renderCarousel"
  [value]="items"
  [numScroll]="numScroll"
  [numVisible]="visibleItems"
  [circular]="circular"
  [autoplayInterval]="autoplayInterval"
  [indicatorsContentClass]="'hidden'"
  [ngClass]="[customClass]"
  (onPage)="onPage($event)">

  <ng-template let-content pTemplate="item">

    <app-service-card *ngIf="!templateRef" [data]="content" [ngClass]="{'item-active': expression}" [isLoading]="isLoading" [isFeatured]="isFeatured" (onClick)="handleServiceCardClick($event)"></app-service-card>

    <ng-container *ngIf="templateRef">
      <ng-container *ngTemplateOutlet="templateRef; context: { item: content, isLoading: isLoading }"></ng-container>
    </ng-container>

  </ng-template>

</p-carousel>

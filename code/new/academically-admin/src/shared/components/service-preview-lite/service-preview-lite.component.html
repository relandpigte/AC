<div class="service-preview d-flex cursor-pointer position-relative" [style.gap.px]="15" [class.with-remove]="canRemove" (click)="handleClicked()" [class.sidebar]="isSidebar">
    <div *ngIf="canRemove" class="service-preview-remove d-flex justify-content-center align-items-center cursor-pointer" (click)="removeService()">
        <span class="fe fe-x"></span>
    </div>
    <div class="service-preview-image position-relative">
        <img [src]="thumbnailImageUrl" [alt]="serviceName" />
    </div>
    <div class="service-preview-info d-flex flex-column justify-content-center">
        <div class="service-preview-info-identity-name" [class.wrap-text]="!isSidebar">{{ isSidebar ? (serviceName | shorten :textLimit) : serviceName }}</div>
        <div class="service-preview-info-identity-type d-flex align-items-center">{{ serviceType | titlecase }}</div>
    </div>
</div>

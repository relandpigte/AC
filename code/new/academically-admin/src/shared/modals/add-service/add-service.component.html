<div class="modal-card card">
    <div class="card-body p-0">
        <app-service-picker
            [selectedService]="selectedService"
            searchPlaceholder="Search the service you would like to share"
            [isShown]="true"
            [class.show]="true"
            (onClose)="onCloseClick()"
            (onBack)="onCloseClick()"
            (onAdd)="onAddService($event)"
        ></app-service-picker>
    </div>
</div>

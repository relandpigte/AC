<nav class="navbar navbar-vertical navbar-vertical-sm fixed-left navbar-expand-md {{ navigationColor }}" id="sidebarSmall">
  <div class="container-fluid">
    <!-- Toggler -->
    <button
      class="navbar-toggler"
      type="button"
      data-toggle="collapse"
      data-target="#sidebarSmallCollapse"
      aria-controls="sidebarSmallCollapse"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Brand -->
    <a class="navbar-brand" href="./index.html">
      <img src="/assets/themes/dashkit/img/logo.svg" class="navbar-brand-img mx-auto" alt="..." />
    </a>

    <!-- User (xs) -->
    <div class="navbar-user d-md-none">
      <!-- Dropdown -->
      <div class="dropdown">
        <!-- Toggle -->
        <a
          href="#"
          id="sidebarSmallIcon"
          class="dropdown-toggle"
          role="button"
          data-toggle="dropdown"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <div class="avatar avatar-sm avatar-online">
            <img *ngIf="user.profilePictureUrl" [src]="user.profilePictureUrl" class="avatar-img rounded-circle" alt="profile" />
            <img *ngIf="!user.profilePictureUrl" src="assets/img/anonymous.png" class="avatar-img rounded-circle" alt="avatar" />
          </div>
        </a>

        <!-- Menu -->
        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="sidebarSmallIcon">
          <ng-container *ngIf="permission.isGranted('Pages.Profile')">
            <a href="#" [routerLink]="['/app/profile']" class="dropdown-item">Profile</a>
            <hr class="dropdown-divider" />
          </ng-container>
          <ng-container *ngIf="permission.isGranted('Pages.Settings')">
            <a href="#" [routerLink]="['/app/settings']" class="dropdown-item">Settings</a>
            <hr class="dropdown-divider" />
          </ng-container>
          <a href="javascript:;" class="dropdown-item" (click)="onLogoutClick()">Logout</a>
        </div>
      </div>
    </div>

    <!-- Collapse -->
    <div class="collapse navbar-collapse" id="sidebarSmallCollapse">
      <!-- Divider -->
      <hr class="navbar-divider d-none d-md-block mt-0 mb-3" />

      <sidebar-small-menu [routerEvent]="routerEvent"></sidebar-small-menu>

      <!-- Push content down -->
      <div class="mt-auto"></div>

      <!-- Customize -->
      <button class="btn btn-block btn-primary mb-3" (click)="onCustomizeClick()"><i class="fe fe-sliders"></i></button>

      <!-- User (md) -->
      <div class="navbar-user d-none d-md-flex flex-column" id="sidebarSmallUser">
        <!-- Dropup -->
        <div class="dropright">
          <!-- Toggle -->
          <a
            href="#"
            id="sidebarSmallIconCopy"
            class="dropdown-toggle"
            role="button"
            data-toggle="dropdown"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <div class="avatar avatar-sm avatar-online">
              <img *ngIf="user.profilePictureUrl" [src]="user.profilePictureUrl" class="avatar-img rounded-circle" alt="profile" />
              <img *ngIf="!user.profilePictureUrl" src="assets/img/anonymous.png" class="avatar-img rounded-circle" alt="avatar" />
            </div>
          </a>

          <!-- Menu -->
          <div class="dropdown-menu" aria-labelledby="sidebarSmallIconCopy">
            <ng-container *ngIf="permission.isGranted('Pages.Profile')">
              <a href="#" [routerLink]="['/app/profile']" class="dropdown-item">Profile</a>
              <hr class="dropdown-divider" />
            </ng-container>
            <a href="javascript:;" class="dropdown-item" (click)="onLogoutClick()">Logout</a>
          </div>
        </div>
      </div>
    </div>
    <!-- / .navbar-collapse -->
  </div>
</nav>

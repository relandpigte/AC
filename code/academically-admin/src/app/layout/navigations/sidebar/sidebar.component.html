<nav class="navbar navbar-vertical fixed-left navbar-expand-md {{ navigationColor }}" id="sidebar">
  <div class="container-fluid">
    <!-- Toggler -->
    <button
      class="navbar-toggler"
      type="button"
      data-toggle="collapse"
      data-target="#sidebarCollapse"
      aria-controls="sidebarCollapse"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Brand -->
    <a class="navbar-brand" href="./index.html">
      <img src="/assets/themes/dashkit/img/logo.svg" class="navbar-brand-img mx-auto" alt="..." />
    </a>

    <!-- User (xs) -->
    <div class="navbar-user d-md-none">
      <!-- Dropdown -->
      <div class="dropdown">
        <!-- Toggle -->
        <a
          href="#"
          id="sidebarIcon"
          class="dropdown-toggle"
          role="button"
          data-toggle="dropdown"
          aria-haspopup="true"
          aria-expanded="false"
        >
          <div class="avatar avatar-sm avatar-online">
            <img *ngIf="user.profilePictureUrl" [src]="user.profilePictureUrl" class="avatar-img rounded-circle" alt="profile" />
            <img *ngIf="!user.profilePictureUrl" src="assets/img/anonymous.png" class="avatar-img rounded-circle" alt="avatar" />
          </div>
        </a>

        <!-- Menu -->
        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="sidebarIcon">
          <ng-container *ngIf="permission.isGranted('Pages.Profile')">
            <a href="#" [routerLink]="['/app/profile']" class="dropdown-item">Profile</a>
            <hr class="dropdown-divider" />
          </ng-container>
          <a href="javascript:;" class="dropdown-item" (click)="onLogoutClick()">Logout</a>
        </div>
      </div>
    </div>

    <!-- Collapse -->
    <div class="collapse navbar-collapse" id="sidebarCollapse">
      <!-- Form -->
      <form class="mt-4 mb-3 d-md-none">
        <div class="input-group input-group-rounded input-group-merge">
          <input type="search" class="form-control form-control-rounded form-control-prepended" placeholder="Search" aria-label="Search" />
          <div class="input-group-prepend">
            <div class="input-group-text">
              <span class="fe fe-search"></span>
            </div>
          </div>
        </div>
      </form>

      <sidebar-menu [routerEvent]="routerEvent"></sidebar-menu>

      <!-- Push content down -->
      <div class="mt-auto"></div>

      <!-- Customize -->
      <button class="btn btn-block btn-primary mb-4" (click)="onCustomizeClick()"><i class="fe fe-sliders mr-2"></i> Customize</button>

      <!-- User (md) -->
      <div class="navbar-user d-none d-md-flex" id="sidebarUser" *ngIf="themeSettings.navigationPosition !== NavigationPosition.Combo">
        <!-- Icon -->
        <a href="#sidebarModalActivity" class="navbar-user-link" data-toggle="modal">
          <span class="icon">
            <i class="fe fe-bell"></i>
          </span>
        </a>

        <!-- Dropup -->
        <div class="dropup">
          <!-- Toggle -->
          <a
            href="#"
            id="sidebarIconCopy"
            class="dropdown-toggle"
            role="button"
            data-toggle="dropdown"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <div class="avatar avatar-sm avatar-online">
              <img *ngIf="user.profilePictureUrl" [src]="user.profilePictureUrl" class="avatar-img rounded-circle" alt="profile" />
              <img *ngIf="!user.profilePictureUrl" src="assets/img/anonymous.png" class="avatar-img rounded-circle" alt="avatar" />
            </div>
          </a>

          <!-- Menu -->
          <div class="dropdown-menu" aria-labelledby="sidebarIconCopy">
            <ng-container *ngIf="permission.isGranted('Pages.Profile')">
              <a href="#" [routerLink]="['/app/profile']" class="dropdown-item">Profile</a>
              <hr class="dropdown-divider" />
            </ng-container>
            <a href="javascript:;" class="dropdown-item" (click)="onLogoutClick()">Logout</a>
          </div>
        </div>

        <!-- Icon -->
        <a href="#sidebarModalSearch" class="navbar-user-link" data-toggle="modal">
          <span class="icon">
            <i class="fe fe-search"></i>
          </span>
        </a>
      </div>
    </div>
    <!-- / .navbar-collapse -->
  </div>
</nav>

<form class="form-horizontal" autocomplete="off" #createUserModal="ngForm" (ngSubmit)="onFormSubmit()">
  <div class="card">
    <div class="card-header">
      <h4 class="card-header-title">
        {{ 'Details' | localize }}
      </h4>
    </div>
    <div class="card-body">

      <div class="form-row">
        <div class="col-md-8">
          <div class="form-group">
            <label for="">First Name</label>
            <input type="text" class="form-control">
          </div>
          <div class="form-group">
            <label for="">Last Name</label>
            <input type="text" class="form-control">
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group image-panel">
            <label for="">Profile Picture</label>
            <div class="image-container">
              <label for="File" class="image-placeholder">
                <i class="image-placeholder-icon fe fe-upload"></i>
                <span class="image-placeholder-text">{{ 'Click or drag file to upload' }}</span>
              </label>
              <input type="file" />
            </div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="">Date of Birth</label>
        <input type="text" class="form-control">
      </div>

      <div class="form-group">
        <label for="">Address Line 1</label>
        <input type="text" class="form-control">
      </div>

      <div class="form-group">
        <label for="">Address Line 2</label>
        <input type="text" class="form-control">
      </div>

      <div class="form-group">
        <label for="">City</label>
        <input type="text" class="form-control">
      </div>

      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="">Zip/Postal Code</label>
          <input type="text" class="form-control">
        </div>
        <div class="form-group col-md-6">
          <label for="">State/Province</label>
          <input type="text" class="form-control">
        </div>
      </div>

      <div class="form-group">
        <label for="">Country</label>
        <select class="form-control">
          <option></option>
        </select>
      </div>

    </div>
    <div class="card-footer justify-content-between">
      <button type="button" class="btn btn-secondary">
        {{ 'BecomeATutor' | localize }}
      </button>
      <button type="submit" class="btn btn-primary">
        {{ 'Save' | localize }}
      </button>
    </div>
  </div>
</form>

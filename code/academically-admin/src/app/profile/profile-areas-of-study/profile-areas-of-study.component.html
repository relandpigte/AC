<profile-knowledge-base *ngIf="permission.isGranted('Pages.Profile.AreasOfStudy.KnowledgeBase')"></profile-knowledge-base>

<div class="card">
  <div class="card-header">
    <h4 class="card-header-title">
      {{ 'ResearchMethodologies' | localize }}
    </h4>
    <a href="#" class="btn btn-sm btn-primary" (click)="$event.preventDefault()">
      {{ 'AddResearchMethodologies' | localize }}
    </a>
  </div>
  <div class="card-header">
    <div class="row align-items-center">
      <div class="col">
        <form>
          <div class="input-group input-group-flush">
            <div class="input-group-prepend">
              <span class="input-group-text">
                <i class="fe fe-search"></i>
              </span>
            </div>
            <input class="list-search form-control" type="search" name="Search" placeholder="Search" />
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="card-body">
    <div class="alert alert-secondary alert-dismissible discipline" role="alert">
      Interview
      <button type="button" class="close" data-dismiss="alert" aria-label="Close">
        <span aria-hidden="true">×</span>
      </button>
    </div>
  </div>
</div>

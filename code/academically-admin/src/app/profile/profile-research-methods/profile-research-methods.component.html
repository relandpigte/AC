<div class="card" [busy]="isLoading">
  <div class="card-header">
    <h4 class="card-header-title">
      {{ 'ResearchMethods' | localize }}
    </h4>
    <a *ngIf="!isViewOnly" href="#" class="btn btn-sm btn-primary" (click)="$event.preventDefault(); onAddClick()">
      {{ 'Add' | localize }}
    </a>
  </div>
  <div class="card-body">
    <div
      *ngFor="let researchMethod of researchMethods"
      class="alert alert-secondary alert-dismissible ac-alert"
      role="alert"
      [class.pr-2]="isViewOnly"
    >
      {{ researchMethod.name }}
      <button
        *ngIf="!isViewOnly"
        type="button"
        class="close"
        data-dismiss="alert"
        aria-label="Close"
        (click)="$event.preventDefault(); onRemoveClick(researchMethod.id)"
      >
        <span aria-hidden="true">×</span>
      </button>
    </div>
    <div *ngIf="researchMethods.length === 0">
      <h4 class="text-center text-muted">{{ 'NoResearchMethod' | localize }}</h4>
    </div>
  </div>
</div>

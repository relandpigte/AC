<div class="container" [@routerTransition]>
    <div class="row justify-content-center">
      <div class="col-12 col-md-5 col-xl-4 my-5 twofa-wrap">
        <h1 class="display-4 text-center mb-3">{{ '2FA' | localize }}</h1>
        <!-- <p class="text-muted text-center mb-5">
          {{ 'FreeAccessToOurDashboard' | localize }}
        </p> -->
        <form novalidate autocomplete="off" #twoFactorAuthenticationForm="ngForm" (ngSubmit)="onFormSubmit()">
  
          <div class="form-group">
            <label for="verificationCode">{{ 'VerificationCode' | localize }}</label>
            <input type="text" placeholder="" class="form-control" [(ngModel)]="verificationCode" name="verificationCode"  required />
          </div>
  
          <button type="submit" class="btn btn-lg btn-block btn-primary mb-3"
            [disabled]="!twoFactorAuthenticationForm.form.valid || submitting">
            {{ "Verify" | localize }}
          </button>
        </form>
      </div>
    </div>
  </div>

<div [@routerTransition]>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-5 col-xl-4 my-5">
        <h1 class="display-4 text-center mb-3">
          Password reset
        </h1>

        <p class="text-muted text-center mb-5">
          Enter your email to get a password reset link.
        </p>

        <form novalidate autocomplete="off" #resetPasswordForm="ngForm" (ngSubmit)="onResetPasswordSubmit()">
          <div class="form-group">
            <label>Email Address</label>

            <input
              type="email"
              class="form-control"
              placeholder="name@address.com"
              name="emailAddress"
              [(ngModel)]="emailAddress"
              #emailAddressModel="ngModel"
              #emailAddressEl
              required
            />
            <abp-validation-summary [control]="emailAddressModel" [controlEl]="emailAddressEl"></abp-validation-summary>
          </div>

          <button type="submit" [disabled]="!resetPasswordForm.form.valid || saving" class="btn btn-lg btn-block btn-primary mb-3">
            {{ 'ResetPassword' | localize }}
          </button>

          <div class="text-center">
            <small class="text-muted text-center"> Remember your password? <a [routerLink]="['/account/login']">Log in</a>. </small>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

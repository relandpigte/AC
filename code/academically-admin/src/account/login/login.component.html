<!-- CONTENT
    ================================================== -->
<div class="container" [@routerTransition]>
  <div class="row justify-content-center">
    <div class="col-12 col-md-5 col-xl-4 my-5">

      <!-- Heading -->
      <h1 class="display-4 text-center mb-3">
        {{ 'SignIn' | localize }}
      </h1>

      <!-- Subheading -->
      <p class="text-muted text-center mb-5">
        {{ 'FreeAccessToOurDashboard' | localize }}
      </p>

      <!-- Form -->
      <form novalidate autocomplete="off" #loginForm="ngForm" (ngSubmit)="login()">

        <!-- Email address -->
        <div class="form-group">

          <!-- Label -->
          <label for="userNameOrEmailAddress">{{ 'EmailAddress' | localize }}</label>

          <!-- Input -->
          <input type="text" placeholder="name@address.com" class="form-control" id="userNameOrEmailAddress"
            name="userNameOrEmailAddress" [(ngModel)]="authService.authenticateModel.userNameOrEmailAddress" required
            maxlength="256" #userNameOrEmailAddressModel="ngModel" #userNameOrEmailAddressEl />
          <abp-validation-summary [control]="userNameOrEmailAddressModel" [controlEl]="userNameOrEmailAddressEl">
          </abp-validation-summary>

        </div>

        <!-- Password -->
        <div class="form-group">

          <div class="row">
            <div class="col">

              <!-- Label -->
              <label for="password">{{ 'Password' | localize }}</label>

            </div>
            <div class="col-auto">

              <!-- Help text -->
              <a href="javascript:;" class="form-text small text-muted">
                {{ 'ForgotPassword' | localize }}
              </a>

            </div>
          </div> <!-- / .row -->

          <!-- Input group -->
          <div class="input-group input-group-merge">

            <!-- Input -->
            <input type="password" class="form-control" id="password" name="password"
              [(ngModel)]="authService.authenticateModel.password" [placeholder]="'EnterYourPassword' | localize"
              required maxlength="32" #passwordModel="ngModel" #passwordEl />

            <!-- Icon -->
            <div class="input-group-append">
              <span class="input-group-text">
                <i class="fe fe-eye"></i>
              </span>
            </div>

          </div>
          <abp-validation-summary [control]="passwordModel" [controlEl]="passwordEl"></abp-validation-summary>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-lg btn-block btn-primary mb-3"
          [disabled]="!loginForm.form.valid || submitting">
          {{ "SignIn" | localize }}
        </button>

        <!-- Link -->
        <div class="text-center" *ngIf="isSelfRegistrationAllowed">
          <small class="text-muted text-center">
            {{ 'DontHaveAnAccountYet' | localize }} <a href="javascript:;">{{ 'SignUp' | localize }}</a>.
          </small>
        </div>

      </form>

    </div>
  </div> <!-- / .row -->
</div> <!-- / .container -->
